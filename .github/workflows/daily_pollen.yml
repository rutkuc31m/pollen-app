name: Täglicher Pollenflug-Alert

on:
  schedule:
    # 10:15 UTC = 11:15 CET / 12:15 CEST (nach DWD-Update um ~11:00)
    - cron: "15 10 * * *"
  workflow_dispatch:

jobs:
  update-pollen-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pollendaten für Web-Dashboard aktualisieren
        run: python fetch_data.py

      - name: data.json committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update pollen data $(date +%Y-%m-%d)"
          git push

      - name: Pollenflug-Zusammenfassung ausgeben
        run: python pollen_alert.py
