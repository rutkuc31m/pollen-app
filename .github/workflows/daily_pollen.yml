name: Täglicher Pollenflug-Alert

on:
  schedule:
    # 11:00 UTC = 12:00 CET / 13:00 CEST (1h Puffer nach DWD-Update um ~11:00)
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  update-pollen-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pollendaten für Web-Dashboard aktualisieren
        run: python fetch_data.py

      - name: data.json committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update pollen data $(date +%Y-%m-%d)"
          git push

      - name: Discord-Benachrichtigung senden
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python pollen_alert.py
