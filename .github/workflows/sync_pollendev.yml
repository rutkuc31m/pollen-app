name: Sync dev → pollendev

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Push to pollendev repo
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git remote add pollendev https://x-access-token:${{ secrets.GH_PAT }}@github.com/rutkuc31m/pollendev.git
          git push pollendev dev:main --force
