<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2e7d32">
  <title>🌿 Pollenflug</title>
  <style>
    :root {
      --green:  #2e7d32; --green-bg:  #e8f5e9;
      --yellow: #f9a825; --yellow-bg: #fff9c4;
      --orange: #e65100; --orange-bg: #ffe0b2;
      --red:    #c62828; --red-bg:    #ffcdd2;
      --gray:   #9e9e9e; --gray-bg:   #f5f5f5;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --bg: #f0f7f0;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #eee;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1a0f; --card: #1a2e1a; --text: #e8f5e9;
        --muted: #aaa; --border: #2a3e2a; --gray-bg: #2a2a2a;
        --green-bg: #1b3a1b; --yellow-bg: #3a3000; --orange-bg: #3a1e00; --red-bg: #3a1010;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header { background: var(--green); color: #fff; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .header-top h1 { font-size: 1.2rem; font-weight: 700; flex: 1; }
    .offline-badge { background: #ff6f00; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; display: none; }
    .offline-badge.visible { display: inline-block; }
    select#region-select {
      width: 100%; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; outline: none;
    }
    select#region-select option { background: #1a3a1a; color: #fff; }

    /* UPDATE INFO */
    .update-bar { text-align: center; font-size: 0.75rem; color: var(--muted); padding: 8px 16px; }

    /* CONTENT */
    .content { max-width: 680px; margin: 0 auto; padding: 12px 14px 80px; }

    /* AMPEL */
    .ampel-card { border-radius: var(--radius); padding: 20px; margin-bottom: 14px; text-align: center; background: var(--card); box-shadow: var(--shadow); }
    .ampel-indicator { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .ampel-card h2 { font-size: 1.3rem; margin-bottom: 4px; }
    .ampel-card .triggers { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }
    .bg-green  { background: var(--green-bg);  color: var(--green); }
    .bg-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .bg-orange { background: var(--orange-bg); color: var(--orange); }
    .bg-red    { background: var(--red-bg);    color: var(--red); }
    .bg-gray   { background: var(--gray-bg);   color: var(--gray); }

    /* 3-DAY TABS */
    .day-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .day-tab { flex: 1; border-radius: var(--radius); padding: 12px 8px; text-align: center; cursor: pointer; background: var(--card); box-shadow: var(--shadow); border: 2px solid transparent; transition: border-color .15s; }
    .day-tab.active { border-color: var(--green); }
    .day-tab .tab-day { font-size: 0.8rem; color: var(--muted); }
    .day-tab .tab-date { font-size: 0.75rem; color: var(--muted); }
    .day-tab .tab-dot { width: 12px; height: 12px; border-radius: 50%; margin: 6px auto 4px; }
    .day-tab .tab-label { font-size: 0.7rem; font-weight: 600; }

    /* FILTER */
    .section { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .section-header { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
    .section-header h3 { font-size: 0.95rem; font-weight: 600; }
    .section-header button { font-size: 0.75rem; color: var(--green); background: none; border: none; cursor: pointer; }
    .filter-grid { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 14px; }
    .filter-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
      background: var(--gray-bg); color: var(--muted); border: 2px solid transparent;
      transition: all .15s; user-select: none;
    }
    .filter-chip.active { background: var(--green-bg); color: var(--green); border-color: var(--green); }

    /* POLLEN TABLE */
    .pollen-table { width: 100%; border-collapse: collapse; }
    .pollen-table th { padding: 10px 12px; text-align: center; font-size: 0.78rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); background: var(--bg); }
    .pollen-table th:first-child { text-align: left; }
    .pollen-table td { padding: 10px 12px; text-align: center; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    .pollen-table td:first-child { text-align: left; }
    .pollen-table tr:last-child td { border-bottom: none; }
    .pollen-table tr.dimmed td { opacity: .4; }
    .pollen-name { font-weight: 500; font-size: 0.88rem; }
    .saison-badge { font-size: 0.68rem; display: block; margin-top: 2px; }
    .saison-aktiv { color: var(--green); }
    .saison-inaktiv { color: var(--muted); }
    .level-cell { border-radius: 6px; font-size: 0.82rem; padding: 4px 2px; }
    .lv-0   { } .lv-low { background: var(--yellow-bg); }
    .lv-mid { background: var(--orange-bg); } .lv-high { background: var(--red-bg); }
    .selected-col { font-weight: 600; }

    /* SYMPTOME */
    .symptom-date { font-size: 0.8rem; color: var(--muted); padding: 4px 16px 10px; }
    .symptom-row { padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .symptom-row:last-of-type { border-bottom: none; }
    .symptom-label { font-size: 0.85rem; width: 80px; flex-shrink: 0; }
    .symptom-btns { display: flex; gap: 5px; flex: 1; }
    .symptom-btn { flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.8rem; cursor: pointer; transition: all .15s; }
    .symptom-btn.sel { background: var(--green); color: #fff; border-color: var(--green); font-weight: 700; }
    .symptom-save { margin: 12px 16px; width: calc(100% - 32px); padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    .symptom-save:disabled { opacity: .5; cursor: default; }
    .symptom-history { padding: 10px 16px 14px; }
    .history-title { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
    .history-row { display: flex; gap: 6px; align-items: center; margin-bottom: 5px; font-size: 0.78rem; }
    .history-date { width: 52px; color: var(--muted); flex-shrink: 0; }
    .history-dots { display: flex; gap: 4px; }
    .history-dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; }

    /* SAISON KALENDER */
    .saison-grid { padding: 12px 16px 16px; }
    .saison-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.82rem; }
    .saison-name { width: 70px; font-weight: 500; flex-shrink: 0; }
    .saison-bar-wrap { flex: 1; display: flex; gap: 2px; }
    .saison-month { flex: 1; height: 10px; border-radius: 3px; background: var(--border); }
    .saison-month.aktiv { background: var(--green); }
    .saison-month.jetzt { background: var(--yellow); outline: 2px solid var(--orange); outline-offset: 1px; }
    .month-labels { display: flex; gap: 2px; padding: 0 0 6px 80px; }
    .month-label { flex: 1; text-align: center; font-size: 0.6rem; color: var(--muted); }

    /* LEGENDE */
    .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px 16px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

    /* LOADING / ERROR */
    .centered { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 0.95rem; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🌿 Pollenflug</h1>
    <span class="offline-badge" id="offline-badge">Offline</span>
  </div>
  <select id="region-select"><option>Lade Regionen…</option></select>
</header>

<div class="update-bar" id="update-bar">Lade Daten…</div>

<div class="content" id="content">
  <div class="centered"><div class="spinner"></div>Lade DWD-Daten…</div>
</div>

<script>
// ── Konstanten ──────────────────────────────────────────────────────────────

const DATA_URL = "./data.json";
const LS_REGION   = "pollen_region";   // "30-32"
const LS_FILTER   = "pollen_filter";   // ["Birke","Erle",...]
const LS_SYMPTOMS = "pollen_symptoms"; // {"2026-03-11":{niesen:3,...}}
const LS_CACHE    = "pollen_cache";
const LS_CACHE_TS = "pollen_cache_ts";

const POLLEN = [
  { key: "Hasel",    name: "Hasel",    monate: [1,2,3],       saison: "Jan–Mär" },
  { key: "Erle",     name: "Erle",     monate: [2,3,4],       saison: "Feb–Apr" },
  { key: "Esche",    name: "Esche",    monate: [3,4,5],       saison: "Mär–Mai" },
  { key: "Birke",    name: "Birke",    monate: [3,4,5],       saison: "Mär–Mai" },
  { key: "Graeser",  name: "Gräser",   monate: [5,6,7,8],     saison: "Mai–Aug" },
  { key: "Roggen",   name: "Roggen",   monate: [5,6,7],       saison: "Mai–Jul" },
  { key: "Beifuss",  name: "Beifuß",   monate: [7,8,9],       saison: "Jul–Sep" },
  { key: "Ambrosia", name: "Ambrosia", monate: [8,9,10],      saison: "Aug–Okt" },
];

const LEVELS = {
  "-1": { cls: "lv-0",    score: 0, emoji: "⬜", label: "–",              color: "#bbb"   },
  "0":  { cls: "lv-0",    score: 0, emoji: "🟢", label: "keine",          color: "#66bb6a" },
  "0-1":{ cls: "lv-low",  score: 1, emoji: "🟡", label: "keine–gering",   color: "#fdd835" },
  "1":  { cls: "lv-low",  score: 1, emoji: "🟡", label: "gering",         color: "#fdd835" },
  "1-2":{ cls: "lv-mid",  score: 2, emoji: "🟠", label: "gering–mittel",  color: "#fb8c00" },
  "2":  { cls: "lv-mid",  score: 2, emoji: "🟠", label: "mittel",         color: "#fb8c00" },
  "2-3":{ cls: "lv-high", score: 3, emoji: "🔴", label: "mittel–hoch",    color: "#e53935" },
  "3":  { cls: "lv-high", score: 3, emoji: "🔴", label: "hoch",           color: "#e53935" },
};

const MONTHS_SHORT = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DAYS = ["today", "tomorrow", "dayafter_to"];
const DAY_LABELS = ["Heute", "Morgen", "Übermorgen"];

// ── State ────────────────────────────────────────────────────────────────────

let allData = null;
let activeRegionKey = localStorage.getItem(LS_REGION) || "30-32";
let activeFilter = JSON.parse(localStorage.getItem(LS_FILTER) || "null") || POLLEN.map(p => p.key);
let activeDay = 0; // 0=Heute, 1=Morgen, 2=Übermorgen
let symptoms = JSON.parse(localStorage.getItem(LS_SYMPTOMS) || "{}");
let symptomDraft = { niesen: 0, augen: 0, atmung: 0 };

// ── Helpers ───────────────────────────────────────────────────────────────────

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function dateOffset(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit" });
}

function levelOf(val) {
  return LEVELS[String(val)] ?? { cls: "lv-0", score: 0, emoji: "❓", label: String(val), color: "#bbb" };
}

function computeAmpel(pollenObj) {
  let maxScore = 0;
  const triggers = [];
  for (const p of POLLEN) {
    if (!activeFilter.includes(p.key)) continue;
    const val = pollenObj?.[p.key]?.[DAYS[activeDay]] ?? "-1";
    const lv = levelOf(val);
    if (lv.score > 0) triggers.push(p.name);
    if (lv.score > maxScore) maxScore = lv.score;
  }
  if (maxScore === 0) return { cls: "bg-green",  emoji: "✅", label: "Keine Belastung", triggers };
  if (maxScore === 1) return { cls: "bg-yellow", emoji: "🟡", label: "Geringe Belastung", triggers };
  if (maxScore === 2) return { cls: "bg-orange", emoji: "🟠", label: "Mittlere Belastung", triggers };
  return                    { cls: "bg-red",    emoji: "🔴", label: "Hohe Belastung", triggers };
}

function dotClass(score) {
  if (score === 0) return "bg-green";
  if (score === 1) return "bg-yellow";
  if (score === 2) return "bg-orange";
  return "bg-red";
}

function symptomColor(v) {
  if (!v) return "#ccc";
  if (v <= 1) return "#66bb6a";
  if (v <= 2) return "#fdd835";
  if (v <= 3) return "#fb8c00";
  return "#e53935";
}

// ── Region helpers ────────────────────────────────────────────────────────────

function regionKey(r) { return `${r.region_id}-${r.partregion_id}`; }

function findRegion(key) {
  return allData.regions.find(r => regionKey(r) === key) ?? allData.regions[0];
}

function buildRegionOptions() {
  const sel = document.getElementById("region-select");
  // Group by region_name
  const groups = {};
  for (const r of allData.regions) {
    if (!groups[r.region_name]) groups[r.region_name] = [];
    groups[r.region_name].push(r);
  }
  sel.innerHTML = "";
  for (const [name, list] of Object.entries(groups)) {
    const grp = document.createElement("optgroup");
    grp.label = name;
    for (const r of list) {
      const opt = document.createElement("option");
      opt.value = regionKey(r);
      opt.textContent = r.partregion_name || r.region_name;
      if (regionKey(r) === activeRegionKey) opt.selected = true;
      grp.appendChild(opt);
    }
    sel.appendChild(grp);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const region = findRegion(activeRegionKey);
  const pollen = region.pollen;
  const month  = new Date().getMonth() + 1; // 1-12

  const ampel = computeAmpel(pollen);

  // Day tab max scores
  const dayScores = DAYS.map(day => {
    let max = 0;
    for (const p of POLLEN) {
      if (!activeFilter.includes(p.key)) continue;
      const v = levelOf(pollen?.[p.key]?.[day] ?? "-1").score;
      if (v > max) max = v;
    }
    return max;
  });

  const todayEntry = symptoms[todayISO()] ?? null;
  if (todayEntry) {
    symptomDraft = { niesen: todayEntry.niesen, augen: todayEntry.augen, atmung: todayEntry.atmung };
  }

  document.getElementById("content").innerHTML = `

    <!-- AMPEL -->
    <div class="ampel-card">
      <div class="ampel-indicator ${ampel.cls}">${ampel.emoji}</div>
      <h2>${ampel.label}</h2>
      <div class="tab-date">${DAY_LABELS[activeDay]} · ${dateOffset(activeDay)}</div>
      ${ampel.triggers.length ? `<div class="triggers">Aktiv: ${ampel.triggers.join(", ")}</div>` : ""}
    </div>

    <!-- 3-DAY TABS -->
    <div class="day-tabs">
      ${DAY_LABELS.map((label, i) => `
        <div class="day-tab ${i === activeDay ? "active" : ""}" onclick="setDay(${i})">
          <div class="tab-day">${label}</div>
          <div class="tab-date">${dateOffset(i)}</div>
          <div class="tab-dot ${dotClass(dayScores[i])}" style="background:${['#66bb6a','#fdd835','#fb8c00','#e53935'][dayScores[i]]}"></div>
        </div>`).join("")}
    </div>

    <!-- MEINE POLLEN -->
    <div class="section">
      <div class="section-header">
        <h3>🎯 Meine Pollen</h3>
        <button onclick="resetFilter()">Alle</button>
      </div>
      <div class="filter-grid">
        ${POLLEN.map(p => `
          <div class="filter-chip ${activeFilter.includes(p.key) ? "active" : ""}"
               onclick="toggleFilter('${p.key}')">${p.name}</div>`).join("")}
      </div>
    </div>

    <!-- POLLENÜBERSICHT -->
    <div class="section">
      <div class="section-header"><h3>📊 Pollenübersicht</h3></div>
      <table class="pollen-table">
        <thead>
          <tr>
            <th>Pollen</th>
            ${DAY_LABELS.map((l, i) => `<th class="${i === activeDay ? "selected-col" : ""}">${l}<br><span style="font-weight:400;font-size:.7rem">${dateOffset(i)}</span></th>`).join("")}
            <th>Saison</th>
          </tr>
        </thead>
        <tbody>
          ${POLLEN.map(p => {
            const inFilter  = activeFilter.includes(p.key);
            const inSeason  = p.monate.includes(month);
            const vals = DAYS.map(d => pollen?.[p.key]?.[d] ?? "-1");
            const lvls = vals.map(levelOf);
            return `<tr class="${!inFilter ? "dimmed" : ""}">
              <td>
                <div class="pollen-name">${p.name}</div>
                <span class="saison-badge ${inSeason ? "saison-aktiv" : "saison-inaktiv"}">
                  ${inSeason ? "🌱" : "💤"} ${p.saison}
                </span>
              </td>
              ${lvls.map((lv, i) => `
                <td class="level-cell ${lv.cls} ${i === activeDay ? "selected-col" : ""}">
                  ${lv.emoji} <span style="font-size:.78rem">${lv.label}</span>
                </td>`).join("")}
              <td style="font-size:.75rem;color:var(--muted)">${p.saison}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>

    <!-- SYMPTOM-TRACKER -->
    <div class="section">
      <div class="section-header"><h3>🤧 Wie geht's dir heute?</h3></div>
      <div class="symptom-date">${new Date().toLocaleDateString("de-DE", {weekday:"long",day:"2-digit",month:"long"})}</div>
      ${renderSymptomRow("niesen", "Niesen")}
      ${renderSymptomRow("augen",  "Augen")}
      ${renderSymptomRow("atmung", "Atmung")}
      <button class="symptom-save" onclick="saveSymptoms()">Speichern</button>
      ${renderSymptomHistory()}
    </div>

    <!-- SAISONKALENDER -->
    <div class="section">
      <div class="section-header"><h3>📅 Saisonkalender</h3></div>
      <div class="saison-grid">
        <div class="month-labels">
          ${MONTHS_SHORT.map(m => `<div class="month-label">${m}</div>`).join("")}
        </div>
        ${POLLEN.map(p => `
          <div class="saison-item">
            <div class="saison-name">${p.name}</div>
            <div class="saison-bar-wrap">
              ${MONTHS_SHORT.map((_, mi) => {
                const m = mi + 1;
                const isJetzt = m === month;
                const isAktiv = p.monate.includes(m);
                return `<div class="saison-month ${isAktiv ? (isJetzt ? "jetzt" : "aktiv") : ""}"></div>`;
              }).join("")}
            </div>
          </div>`).join("")}
      </div>
    </div>

    <!-- LEGENDE -->
    <div class="section">
      <div class="section-header"><h3>📖 Legende</h3></div>
      <div class="legend-grid">
        <div class="legend-item"><div class="legend-dot" style="background:#66bb6a"></div>Keine Belastung</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fdd835"></div>Gering</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fb8c00"></div>Mittel</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div>Hoch</div>
      </div>
    </div>
  `;
}

function renderSymptomRow(key, label) {
  const current = symptomDraft[key] ?? 0;
  return `
    <div class="symptom-row">
      <div class="symptom-label">${label}</div>
      <div class="symptom-btns">
        ${[0,1,2,3,4,5].map(v => `
          <button class="symptom-btn ${current === v ? "sel" : ""}"
                  onclick="setSymptom('${key}', ${v})">${v === 0 ? "–" : v}</button>`).join("")}
      </div>
    </div>`;
}

function renderSymptomHistory() {
  const entries = Object.entries(symptoms).sort((a,b) => b[0].localeCompare(a[0])).slice(0, 7);
  if (!entries.length) return "";
  return `
    <div class="symptom-history">
      <div class="history-title">Letzte Einträge</div>
      ${entries.map(([date, s]) => `
        <div class="history-row">
          <div class="history-date">${new Date(date + "T12:00:00").toLocaleDateString("de-DE", {day:"2-digit",month:"2-digit"})}</div>
          <div class="history-dots">
            ${["niesen","augen","atmung"].map(k => `
              <div class="history-dot" style="background:${symptomColor(s[k])}" title="${k}: ${s[k]}">${s[k]||"–"}</div>`).join("")}
          </div>
          <div style="font-size:.75rem;color:var(--muted);margin-left:4px">N · A · At</div>
        </div>`).join("")}
    </div>`;
}

// ── Event handlers ─────────────────────────────────────────────────────────────

function setDay(i) {
  activeDay = i;
  render();
}

function toggleFilter(key) {
  if (activeFilter.includes(key)) {
    activeFilter = activeFilter.filter(k => k !== key);
  } else {
    activeFilter.push(key);
  }
  localStorage.setItem(LS_FILTER, JSON.stringify(activeFilter));
  render();
}

function resetFilter() {
  activeFilter = POLLEN.map(p => p.key);
  localStorage.setItem(LS_FILTER, JSON.stringify(activeFilter));
  render();
}

function setSymptom(key, val) {
  symptomDraft[key] = val;
  const rows = document.querySelectorAll(".symptom-row");
  rows.forEach(row => {
    const label = row.querySelector(".symptom-label");
    if (!label) return;
    const labels = { niesen: "Niesen", augen: "Augen", atmung: "Atmung" };
    if (labels[key] && label.textContent === labels[key]) {
      row.querySelectorAll(".symptom-btn").forEach((btn, i) => {
        btn.classList.toggle("sel", i === val);
      });
    }
  });
}

function saveSymptoms() {
  symptoms[todayISO()] = { ...symptomDraft };
  localStorage.setItem(LS_SYMPTOMS, JSON.stringify(symptoms));
  render();
}

document.getElementById("region-select").addEventListener("change", e => {
  activeRegionKey = e.target.value;
  localStorage.setItem(LS_REGION, activeRegionKey);
  render();
});

// ── Data loading ────────────────────────────────────────────────────────────

async function loadData() {
  // Versuche frische Daten
  try {
    const resp = await fetch(DATA_URL + "?t=" + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    allData = await resp.json();
    localStorage.setItem(LS_CACHE, JSON.stringify(allData));
    localStorage.setItem(LS_CACHE_TS, new Date().toISOString());
  } catch {
    // Fallback: Cache
    const cached = localStorage.getItem(LS_CACHE);
    if (cached) {
      allData = JSON.parse(cached);
      document.getElementById("offline-badge").classList.add("visible");
    } else {
      document.getElementById("content").innerHTML =
        `<div class="centered">❌ Keine Daten verfügbar.<br><small>Bitte Internetverbindung prüfen.</small></div>`;
      return;
    }
  }

  // Update-Bar
  const lu = allData.last_update || "";
  const nu = allData.next_update || "";
  document.getElementById("update-bar").textContent =
    `Stand: ${lu}${nu ? " · Nächstes Update: " + nu : ""}`;

  buildRegionOptions();
  render();
}

loadData();
</script>
