<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff" id="theme-meta">
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pollenflug">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="icon" href="./apple-touch-icon.png" type="image/png">
  <title>Pollenflug</title>
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:      #f6f6f7;
      --card:    #ffffff;
      --card2:   #f9f9fa;
      --border:  #e4e4e7;
      --text:    #09090b;
      --text2:   #71717a;
      --text3:   #a1a1aa;
      --accent:  #16a34a;
      --accent-subtle: #f0fdf4;
      --r:       13px;
      --sh:      0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    }
    [data-theme="dark"] {
      --bg:     #0a0a0b;
      --card:   #18181b;
      --card2:  #27272a;
      --border: #3f3f46;
      --text:   #fafafa;
      --text2:  #a1a1aa;
      --text3:  #71717a;
      --accent: #4ade80;
      --accent-subtle: #052e16;
      --sh:     0 1px 3px rgba(0,0,0,.5);
    }

    /* ── BASE ────────────────────────────────────────── */
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .2s, color .2s;
      min-height: 100vh;
    }
    button, select { font-family: inherit; }

    /* ── HEADER ──────────────────────────────────────── */
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 99;
      padding: 0 16px;
    }
    .topbar-inner {
      max-width: 640px; margin: 0 auto;
      height: 52px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo { font-weight: 700; font-size: 1rem; flex: 1; letter-spacing: -.2px; }
    .logo em { color: var(--accent); font-style: normal; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card2); color: var(--text);
      cursor: pointer; font-size: .95rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--border); }
    .offline-pill {
      font-size: .7rem; background: #f97316; color: #fff;
      padding: 2px 9px; border-radius: 20px; display: none;
    }
    .offline-pill.show { display: inline-block; }

    /* region bar */
    .regionbar {
      border-top: 1px solid var(--border);
      padding: 8px 16px 6px;
    }
    .regionbar-inner { max-width: 640px; margin: 0 auto; }
    .regionbar select {
      width: 100%;
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 7px 12px; font-size: .84rem; outline: none; cursor: pointer;
    }
    .regionbar select:focus { border-color: var(--accent); }
    .src-bar {
      max-width: 640px; margin: 4px auto 0;
      display: flex; align-items: center; gap: 5px;
    }
    .src-label { font-size: .68rem; color: var(--text3); flex-shrink: 0; }
    .src-btn {
      font-size: .7rem; padding: 2px 8px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--text3);
      transition: all .15s;
    }
    .src-btn.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 15%, var(--card));
      color: var(--text); font-weight: 600;
    }
    .src-detected { font-size: .64rem; color: var(--text3); margin-left: auto; opacity: .7; }

    /* ── PAGE ────────────────────────────────────────── */
    .page { max-width: 640px; margin: 0 auto; padding: 14px 14px 80px; }

    /* ── UPDATE LINE ─────────────────────────────────── */
    .update-line {
      font-size: .73rem; color: var(--text3);
      text-align: center; padding: 6px 0 10px;
    }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh);
      margin-bottom: 12px; overflow: hidden;
    }
    .card-head {
      padding: 13px 16px 11px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .card-head.collapsible { cursor: pointer; user-select: none; border-bottom: none; }
    .card-head.collapsible.open { border-bottom: 1px solid var(--border); }
    .card-title { font-size: .78rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .card-action { font-size: .78rem; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
    .collapse-arrow { font-size: .75rem; color: var(--text3); transition: transform .2s; }
    .card-head.collapsible.open .collapse-arrow { transform: rotate(180deg); }
    .collapsible-body { display: none; }
    .collapsible-body.open { display: block; }

    /* ── HERO (personal risk) ────────────────────────── */
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh);
      margin-bottom: 12px; padding: 26px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .hero-badge {
      width: 64px; height: 64px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; flex-shrink: 0; font-weight: 800;
      background: transparent !important;
    }
    .dc-ring { background: transparent !important; }
    .hero-body { flex: 1; min-width: 0; }
    .hero-risk { font-size: 1.42rem; font-weight: 700; line-height: 1.2; background: transparent !important; }
    .hero-loc  { font-size: .8rem; color: var(--text2); margin-top: 2px; }
    .hero-drivers { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
    .driver-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: .78rem; font-weight: 500;
      background: transparent !important;
    }

    /* colour tokens per level */
    .risk-none   { --rc:#71717a; --rb:#f4f4f5; }
    .risk-low    { --rc:#65a30d; --rb:#ecfccb; }
    .risk-mid    { --rc:#a16207; --rb:#fef9c3; }
    .risk-high   { --rc:#b91c1c; --rb:#fee2e2; }
    [data-theme="dark"] .risk-none  { --rc:#a1a1aa; --rb:#27272a; }
    [data-theme="dark"] .risk-low   { --rc:#a3e635; --rb:#1a2e05; }
    [data-theme="dark"] .risk-mid   { --rc:#fde047; --rb:#1c1400; }
    [data-theme="dark"] .risk-high  { --rc:#f87171; --rb:#1c0000; }
    .risk-none,.risk-low,.risk-mid,.risk-high {
      color: var(--rc); background: var(--rb);
    }

    /* ── 3-DAY STRIP ─────────────────────────────────── */
    .days-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .day-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh);
      padding: 12px 10px; text-align: center; cursor: pointer;
      transition: border-color .15s;
    }
    .day-card.active { border-color: var(--accent); border-width: 2px; }
    .day-card.today-card { background: var(--accent-subtle); }
    .day-card .dc-label { font-size: .78rem; font-weight: 600; color: var(--text); }
    .day-card .dc-date  { font-size: .68rem; color: var(--text3); margin-top: 1px; }
    .day-card .dc-ring  {
      width: 36px; height: 36px; border-radius: 50%;
      margin: 9px auto 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700;
    }
    .day-card .dc-sub { font-size: .68rem; color: var(--text2); }

    /* ── ALLERGEN SELECTOR ───────────────────────────── */
    .allergy-grid { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 14px 14px; }
    .allergy-chip {
      padding: 5px 10px; border-radius: 9px;
      font-size: .77rem; cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card2); color: var(--text2);
      display: flex; align-items: center; gap: 5px;
      transition: all .12s; user-select: none;
    }
    .allergy-chip.on {
      background: #dcfce7;
      color: #15803d;
      border-color: #16a34a;
      font-weight: 500;
    }
    [data-theme="dark"] .allergy-chip.on {
      background: #052e16;
      color: #4ade80;
      border-color: #4ade80;
    }

    /* ── POLLEN TABLE ────────────────────────────────── */
    .ptable { width: 100%; border-collapse: collapse; }
    .ptable th {
      padding: 9px 11px; font-size: .73rem; font-weight: 500;
      color: var(--text2); border-bottom: 1px solid var(--border);
      background: var(--card2); text-align: center;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .ptable th:first-child { text-align: left; }
    .ptable td {
      padding: 9px 11px; font-size: .84rem;
      border-bottom: 1px solid var(--border); text-align: center;
      vertical-align: middle;
    }
    .ptable td:first-child { text-align: left; }
    .ptable tr:last-child td { border-bottom: none; }
    .ptable tr.dim { opacity: .35; }
    .ptable tr.active-row td:first-child { border-left: 3px solid var(--accent); }
    .pname  { font-weight: 500; font-size: .86rem; }
    .picon  { font-size: 1rem; margin-right: 5px; }
    .ps     { font-size: .68rem; display: block; margin-top: 1px; }
    .ps.on  { color: var(--accent); }
    .ps.off { color: var(--text3); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: .76rem; font-weight: 500;
    }
    .b-none { color: var(--text3); }
    .b-low  { color:#65a30d; }
    .b-mid  { color:#a16207; }
    .b-high { color:#b91c1c; }
    [data-theme="dark"] .b-low  { color:#a3e635; }
    [data-theme="dark"] .b-mid  { color:#fde047; }
    [data-theme="dark"] .b-high { color:#f87171; }
    .col-hi { font-weight: 600; }

    /* ── WEEKLY HISTORY HEATMAP ──────────────────────── */
    .week-heatmap { padding: 10px 14px 14px; overflow-x: auto; }
    .week-heatmap-inner { min-width: 280px; }
    .wh-header { display: grid; grid-template-columns: 52px repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .wh-dayname { font-size: .65rem; color: var(--text3); text-align: center; font-weight: 600; }
    .wh-dayname.wh-weekend { color: var(--accent); }
    .wh-row { display: grid; grid-template-columns: 52px repeat(7, 1fr); gap: 3px; margin-bottom: 3px; align-items: center; }
    .wh-week-label { font-size: .62rem; color: var(--text3); padding-right: 4px; text-align: right; line-height: 1.2; }
    .wh-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: .6rem; color: var(--text3);
      background: var(--border);
      position: relative; cursor: default;
      min-height: 28px;
    }
    .wh-cell.wh-today { outline: 2px solid var(--accent); outline-offset: -1px; }
    .wh-cell.wh-future { opacity: .3; }
    .wh-cell[data-sc="0"] { background: color-mix(in srgb, #65a30d 18%, var(--card)); color: #65a30d; }
    .wh-cell[data-sc="1"] { background: color-mix(in srgb, #65a30d 35%, var(--card)); color: #3f6212; }
    .wh-cell[data-sc="2"] { background: color-mix(in srgb, #a16207 45%, var(--card)); color: #78350f; }
    .wh-cell[data-sc="3"] { background: color-mix(in srgb, #b91c1c 55%, var(--card)); color: #7f1d1d; }
    [data-theme="dark"] .wh-cell[data-sc="0"] { color: #86efac; }
    [data-theme="dark"] .wh-cell[data-sc="1"] { color: #bef264; }
    [data-theme="dark"] .wh-cell[data-sc="2"] { color: #fde68a; }
    [data-theme="dark"] .wh-cell[data-sc="3"] { color: #fca5a5; }
    .wh-date { font-size: .6rem; line-height: 1; }
    .wh-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; margin-top: 2px; }
    .wh-legend { display: flex; gap: 10px; padding: 8px 0 0 52px; flex-wrap: wrap; }
    .wh-leg-item { display: flex; align-items: center; gap: 4px; font-size: .68rem; color: var(--text3); }
    .wh-leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ── ANNUAL SEASON HEATMAP ───────────────────────── */
    .s25-wrap { padding: 10px 14px 12px; }
    .s25-grid { display: grid; grid-template-columns: 22px repeat(12, minmax(0, 1fr)); gap: 3px; align-items: center; }
    .s25-name { font-size: .85rem; text-align: center; line-height: 1; cursor: default; user-select: none; }
    .s25-mon  { font-size: .6rem; color: var(--text3); text-align: center; font-weight: 600; padding: 0 0 2px; }
    .s25-cell {
      aspect-ratio: 1; border-radius: 3px;
      background: var(--border);
      position: relative;
    }
    .s25-cell[data-v="1"] { background: color-mix(in srgb,#65a30d 45%,var(--card)); }
    .s25-cell[data-v="2"] { background: color-mix(in srgb,#a16207 58%,var(--card)); }
    .s25-cell[data-v="3"] { background: color-mix(in srgb,#b91c1c 68%,var(--card)); }
    [data-theme="dark"] .s25-cell[data-v="1"] { background: #365314; }
    [data-theme="dark"] .s25-cell[data-v="2"] { background: #713f12; }
    [data-theme="dark"] .s25-cell[data-v="3"] { background: #7f1d1d; }
    .s25-note { padding: 8px 0 0; font-size: .65rem; color: var(--text3); font-style: italic; }
    .s25-tip {
      position: fixed; z-index: 999;
      background: var(--text); color: var(--card);
      font-size: .78rem; padding: 4px 9px; border-radius: 6px;
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity .15s;
    }
    .s25-tip.show { opacity: 1; }

    /* ── SYMPTOM TRACKER ─────────────────────────────── */
    .sym-date { font-size: .76rem; color: var(--text2); padding: 8px 14px 4px; }
    .sym-row  {
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      border-top: 1px solid var(--border);
    }
    .sym-icon  { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
    .sym-label { font-size: .84rem; width: 70px; flex-shrink: 0; }
    .sym-scale { display: flex; gap: 4px; flex: 1; }
    .sym-btn {
      flex: 1; padding: 6px 2px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--text); font-size: .78rem; cursor: pointer;
      transition: all .1s;
    }
    .sym-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    [data-theme="dark"] .sym-btn.on { color: #000; }
    .sym-save {
      display: block; margin: 10px 14px;
      width: calc(100% - 28px); padding: 10px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
    }
    [data-theme="dark"] .sym-save { color: #000; }
    .sym-save:hover { opacity: .85; }
    .sym-hist { padding: 8px 14px 12px; border-top: 1px solid var(--border); }
    .sym-hist-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); margin-bottom: 7px; }
    .sym-hist-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: .76rem; }
    .sym-hist-date { width: 42px; color: var(--text3); flex-shrink: 0; }
    .sym-dot { width: 19px; height: 19px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 700; }

    /* ── SEASON CAL ──────────────────────────────────── */
    .season-wrap { padding: 10px 14px 14px; }
    .season-mhead { display: flex; gap: 2px; margin-left: 66px; margin-bottom: 5px; }
    .season-ml { flex: 1; text-align: center; font-size: .58rem; color: var(--text3); }
    .season-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .season-name { width: 60px; font-size: .78rem; flex-shrink: 0; }
    .season-bar { flex: 1; display: flex; gap: 2px; }
    .sm { flex: 1; height: 8px; border-radius: 3px; background: var(--border); }
    .sm.on  { background: var(--accent); opacity: .5; }
    .sm.now { background: var(--accent); opacity: 1; outline: 2px solid var(--accent); outline-offset: 1px; }

    /* ── LEGEND ──────────────────────────────────────── */
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; padding: 10px 14px 14px; }
    .li { display: flex; align-items: center; gap: 8px; font-size: .81rem; }
    .ld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── LOADER / ERROR ──────────────────────────────── */
    .center { text-align: center; padding: 60px 20px; color: var(--text2); }
    .spin { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 12px; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* ── GEO BUTTON ──────────────────────────────────── */
    .regionbar-inner { display: flex; gap: 6px; align-items: center; }
    .geo-btn {
      flex-shrink: 0; padding: 7px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--text2); cursor: pointer; font-size: .84rem;
      white-space: nowrap;
    }
    .geo-btn:hover { background: var(--border); }
    .geo-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── SWIPE DOTS ───────────────────────────────────── */
    .swipe-dots { display: flex; justify-content: center; gap: 6px; margin: -4px 0 8px; }
    .swipe-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .2s; }
    .swipe-dot.active { background: var(--accent); }

    /* ── WEEK WEATHER ────────────────────────────────── */
    .week-strip { padding: 0 14px 12px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .week-strip::-webkit-scrollbar { display: none; }
    .week-day {
      flex: 0 0 auto; min-width: 52px; text-align: center;
      padding: 7px 5px; border-radius: 9px; background: var(--card2);
      border: 1px solid var(--border);
    }
    .week-day.today-wk { border-color: var(--accent); }
    .wd-name { font-size: .62rem; color: var(--text3); font-weight: 600; text-transform: uppercase; }
    .wd-icon { font-size: .95rem; margin: 3px 0; }
    .wd-temp { font-size: .8rem; font-weight: 700; }
    .wd-rain { font-size: .62rem; color: var(--text3); margin-top: 1px; }
    .wd-uv   { font-size: .6rem; color: var(--text3); margin-top: 1px; }
    .uv-hi   { color: #b91c1c; }
    .uv-mid  { color: #c2410c; }
    .uv-low  { color: #a16207; }

    /* ── CORRELATION ─────────────────────────────────── */
    .corr-wrap { padding: 10px 14px 14px; border-top: 1px solid var(--border); }
    .corr-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); margin-bottom: 8px; }
    .corr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .corr-name { width: 62px; font-size: .78rem; flex-shrink: 0; }
    .corr-track { flex: 1; background: var(--border); border-radius: 4px; height: 7px; overflow: hidden; }
    .corr-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .corr-lbl { font-size: .7rem; color: var(--text3); width: 28px; text-align: right; flex-shrink: 0; }

    /* ── DRAWER ──────────────────────────────────────── */
    #drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    #drawer-overlay.show { opacity: 1; pointer-events: all; }
    #drawer {
      position: fixed; top: 0; left: 0; height: 100%;
      width: min(300px, 85vw);
      background: var(--card); z-index: 201;
      transform: translateX(-100%);
      transition: transform .28s ease;
      overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,.18);
    }
    #drawer.open { transform: translateX(0); }
    #drawer-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: .95rem;
      position: sticky; top: 0; background: var(--card); z-index: 1;
    }
    #drawer-head button {
      background: none; border: none; font-size: 1.2rem;
      cursor: pointer; color: var(--text2); padding: 2px 6px;
    }
    .dsec-head {
      padding: 12px 16px; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--border);
      font-size: .78rem; font-weight: 600;
      color: var(--text2); text-transform: uppercase; letter-spacing: .5px;
    }
    .dsec-arrow { font-size: .75rem; color: var(--text3); transition: transform .2s; }
    .dsec-head.open .dsec-arrow { transform: rotate(180deg); }
    .dsec-body { display: none; }
    .dsec-body.open { display: block; }

    /* ── EXPOSURE SCORE BAR ──────────────────────────── */
    .exp-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 5px; }
    .exp-bar-fill { height: 100%; border-radius: 3px; background: var(--rc); transition: width .5s ease; }

    /* ── BEST TIME OUTSIDE ───────────────────────────── */
    .time-windows { display: flex; gap: 7px; flex-wrap: wrap; padding: 12px 14px 6px; }
    .time-win {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 9px;
      font-size: .82rem; font-weight: 500;
    }
    .time-win.good  { background: #dcfce7; color: #15803d; }
    .time-win.warn  { background: #fee2e2; color: #b91c1c; }
    .time-win.none  { background: var(--card2); color: var(--text2); }
    [data-theme="dark"] .time-win.good { background: #052e16; color: #4ade80; }
    [data-theme="dark"] .time-win.warn { background: #1c0000; color: #f87171; }
    .time-note { font-size: .67rem; color: var(--text3); padding: 2px 14px 12px; }

    /* ── TIPS ────────────────────────────────────────── */
    .tips-group { padding: 10px 14px 6px; }
    .tips-group + .tips-group { padding-top: 4px; }
    .tips-group-title { font-size: .67rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
    .tip-row { display: flex; align-items: baseline; gap: 7px; font-size: .82rem; padding: 2px 0; }
    .tip-ok   { color: #15803d; font-weight: 700; flex-shrink: 0; }
    .tip-no   { color: #b91c1c; font-weight: 700; flex-shrink: 0; }
    [data-theme="dark"] .tip-ok { color: #4ade80; }
    [data-theme="dark"] .tip-no { color: #f87171; }

    .nearby-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--border);
      font-size: .82rem;
    }
    .nearby-row:last-child { border-bottom: none; }
    .nearby-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .nearby-dist { font-size: .7rem; color: var(--text3); width: 50px; text-align: right; flex-shrink: 0; }
    .escape-box {
      margin: 4px 14px 14px; padding: 10px 13px; border-radius: 9px;
      background: #dcfce7; color: #15803d; font-size: .82rem; line-height: 1.4;
      border: 1px solid #bbf7d0;
    }
    [data-theme="dark"] .escape-box { background: #052e16; color: #4ade80; border-color: #166534; }

    /* ── TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #18181b; color: #fafafa;
      padding: 9px 18px; border-radius: 20px;
      font-size: .83rem; z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── PWA INSTALL BUTTON ──────────────────────────── */
    #pwa-install-btn {
      display: none; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, var(--card));
      color: var(--accent); font-size: .74rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    #pwa-install-btn.show { display: flex; }
    #pwa-install-btn:hover { background: color-mix(in srgb, var(--accent) 20%, var(--card)); }

    /* ── DAY TRANSITION ──────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .day-transition { animation: fadeInUp .18s ease; }

    /* ── HERO SUMMARY SENTENCE ───────────────────────── */
    .hero-summary {
      font-size: .8rem; color: var(--text2);
      margin-top: 5px; line-height: 1.4;
      padding: 5px 8px; border-radius: 7px;
      background: color-mix(in srgb, var(--rc, #71717a) 8%, var(--card));
    }

    /* ── CORRELATION IMPROVEMENTS ────────────────────── */
    .corr-fill-low  { background: #65a30d; }
    .corr-fill-mid  { background: #a16207; }
    .corr-fill-high { background: #b91c1c; }
    [data-theme="dark"] .corr-fill-low  { background: #a3e635; }
    [data-theme="dark"] .corr-fill-mid  { background: #fde047; }
    [data-theme="dark"] .corr-fill-high { background: #f87171; }
    .corr-meta { font-size: .67rem; color: var(--text3); margin-top: 2px; }

    .accuracy-box {
      margin: 6px 14px 10px; padding: 8px 12px; border-radius: 8px;
      background: var(--card2); border: 1px solid var(--border);

function escapeHtml(s) {

}
function lv(v)  { return LV[String(v)] ?? {cls:"b-none",sc:0,label:String(v),rc:"none"}; }
function rk(r)  { return `${r.region_id}-${r.partregion_id}`; }

function personalRisk(pol, dayIdx) {
  let max=0; const drivers=[];
  for (const p of POLLEN) {
    if (!filter.includes(p.key)) continue;
    const l = lv(pol?.[p.key]?.[DAYS[dayIdx]]??"-1");
    const sev = severity[p.key] || "mild";
    const sc = sev === "strong" ? l.sc : Math.floor(l.sc * 0.7); // mild = 70%
    if (sc>0) drivers.push({...p, pillCls:["risk-none","risk-low","risk-mid","risk-high"][sc]});
    if (sc>max) max=sc;
  }
  return { ...RISK[max], max, drivers };
}

// ─────────────────────────────────────────────────────────────────────────────
// HAVERSINE DISTANCE (km between two lat/lon points)
// ─────────────────────────────────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ─────────────────────────────────────────────────────────────────────────────
// EXPOSURE SCORE 0–100
// ─────────────────────────────────────────────────────────────────────────────
function calcExposureScore(pol, dayIdx) {
  const risk = personalRisk(pol, dayIdx);
  const wd   = weather?.daily?.[dayIdx];
  let score  = [0, 25, 50, 70][risk.max];
  const wind = wd?.wind ?? 0;
  const rain = wd?.rain ?? 0;
  const uv   = wd?.uv   ?? 0;
  score += wind > 30 ? 20 : wind > 20 ? 12 : wind > 10 ? 6 : 0;
  score -= rain > 5  ? 20 : rain > 2  ? 12 : rain > 0.5 ? 6 : 0;
  score += uv  > 8  ? 10 : uv  > 5  ?  5 : 0;
  return Math.max(0, Math.min(100, Math.round(score)));
}

// ─────────────────────────────────────────────────────────────────────────────
// BEST TIME OUTSIDE
// ─────────────────────────────────────────────────────────────────────────────
function calcBestTimes(pol, dayIdx) {
  const wd   = weather?.daily?.[dayIdx];
  if (!wd) return null;
  const risk = personalRisk(pol, dayIdx).max;
  const wind = wd.wind ?? 0, rain = wd.rain ?? 0, uv = wd.uv ?? 0;
  if (risk === 0) return { good: [t("besttime_allday")], avoid: null };
  if (risk >= 3 && wind > 25 && rain < 0.5) return { good: [], avoid: null };
  if (risk >= 3 && wind > 20) return { good: [], avoid: t("besttime_none") };
  const good = [];
  if (wind <= 20) good.push("06:00–09:00");
  if (wind <= 25 && rain < 3) good.push("19:00–22:00");
  const avoid = (uv > 5 && risk >= 2) ? "11:00–16:00" : null;
  return { good, avoid };
}

function storeHistoryDay(pol) {

  if (history[today]) return; // already stored today
  const entry = {};
  for (const p of POLLEN) {
    entry[p.key] = pol?.[p.key]?.today ?? "-1";
  }
  history[today] = entry;
  // keep only last 90 days (needed for symptom correlation)
  const keys = Object.keys(history).sort().slice(-90);
  const trimmed = {};
  keys.forEach(k => trimmed[k] = history[k]);
  history = trimmed;
  localStorage.setItem(LS.hist, JSON.stringify(history));
}

function renderHistory() {
  const allDays = Object.keys(history).sort();
  if (allDays.length < 1) {
    return `<div style="padding:12px 14px;font-size:.83rem;color:var(--text3)">${t("wh_no_data")}</div>`;
  }

  // Day names Mon–Sun (0=Mon, 6=Sun in our grid)
  const isDE = lang === "de";
  const DOW = isDE
    ? ["Mo","Di","Mi","Do","Fr","Sa","So"]
    : ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  const todayStr = todayISO();

  // Group dates by ISO week (Mon-based). Week key = date of Monday.
  function isoWeekMonday(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    const day = (d.getDay() + 6) % 7; // 0=Mon … 6=Sun
    const mon = new Date(d); mon.setDate(d.getDate() - day);
    return mon.toISOString().slice(0, 10);
  }

  // Build a set of all weeks we need (from first day to today)
  const firstDay = allDays[0];
  const weekSet = new Set();
  {
    const cur = new Date(isoWeekMonday(firstDay) + "T12:00:00");
    const end = new Date(isoWeekMonday(todayStr) + "T12:00:00");
    while (cur <= end) {
      weekSet.add(cur.toISOString().slice(0, 10));
      cur.setDate(cur.getDate() + 7);
    }
  }
  const weeks = [...weekSet].sort().slice(-13); // max 13 weeks (~3 months)

  // Compute daily risk score from history
  function dayScore(dateStr) {
    const h = history[dateStr];
    if (!h) return -1;
    let max = -1;
    for (const p of POLLEN) {
      if (!filter.includes(p.key)) continue;
      const sc = lv(h[p.key] ?? "-1").sc;
      if (sc > max) max = sc;
    }
    return max; // -1 = no data, 0 = none, 1 = low, 2 = mid, 3 = high
  }

  const headerCells = DOW.map((d, i) =>
    `<div class="wh-dayname${i>=5?" wh-weekend":""}">${d}</div>`
  ).join("");

  const rows = weeks.map(monStr => {
    const monDate = new Date(monStr + "T12:00:00");
    const weekLabel = monDate.toLocaleDateString(isDE?"de-DE":"en-GB",{day:"2-digit",month:"2-digit"});

    const cells = Array.from({length: 7}, (_, i) => {
      const d = new Date(monDate); d.setDate(monDate.getDate() + i);
      const dStr2 = d.toISOString().slice(0, 10);
      const dayNum = d.getDate();
      const isFuture = dStr2 > todayStr;
      const isToday = dStr2 === todayStr;
      const sc = dayScore(dStr2);
      const hasData = sc >= 0;

      let cls = "wh-cell";
      if (isToday) cls += " wh-today";
      if (isFuture) cls += " wh-future";

      const scAttr = hasData && !isFuture ? ` data-sc="${sc}"` : "";
      const dot = hasData && !isFuture && sc > 0 ? `<div class="wh-dot"></div>` : "";
      const titleText = isFuture ? dStr2 : (hasData ? `${dStr2}: ${["–","▲","▲▲","▲▲▲"][sc]??sc}` : dStr2);

      return `<div class="${cls}"${scAttr} title="${titleText}">
        <span class="wh-date">${dayNum}</span>${dot}
      </div>`;
    }).join("");

    return `<div class="wh-row"><div class="wh-week-label">${weekLabel}</div>${cells}</div>`;
  }).join("");

  const legItems = [
    {bg:"var(--border)",                              label: t("wh_leg_empty")},
    {bg:"color-mix(in srgb,#65a30d 35%,var(--card))",label: t("wh_leg_none")},
    {bg:"color-mix(in srgb,#65a30d 35%,var(--card))",label: t("wh_leg_low")},
    {bg:"color-mix(in srgb,#a16207 45%,var(--card))",label: t("wh_leg_mid")},
    {bg:"color-mix(in srgb,#b91c1c 55%,var(--card))",label: t("wh_leg_high")},
  ].map(({bg, label}) =>
    `<div class="wh-leg-item">
      <div class="wh-leg-dot" style="background:${bg}"></div>
      <span>${label}</span>
    </div>`
  ).join("");

  return `
    <div class="week-heatmap">
      <div class="week-heatmap-inner">
        <div class="wh-header"><div></div>${headerCells}</div>
        ${rows}
        <div class="wh-legend">${legItems}</div>
      </div>
    </div>`;
}

// Map DWD region_id to regional seasonal profile
function getRegionalSeasonProfile() {
  if (!db || appMode !== "de") return SEASON_REGIONAL.central;
  const reg = db.regions.find(r => rk(r) === rKey) ?? db.regions[0];
  const rid = reg?.region_id ?? 30;
  if (rid <= 20)  return SEASON_REGIONAL.north;
  if (rid <= 50)  return SEASON_REGIONAL.central;
  if (rid <= 85)  return SEASON_REGIONAL.east;
  if (rid <= 105) return SEASON_REGIONAL.southwest;
  return SEASON_REGIONAL.south;
}

function renderSeason2025() {
  const MONTHS = t("months").split(",");
  const MON_SHORT = MONTHS.map(m => m.slice(0,3));
  const lvLabels = [t("wh_leg_none"), t("wh_leg_low"), t("wh_leg_mid"), t("wh_leg_high")];

  const headerRow = `<div class="s25-name"></div>
    ${MON_SHORT.map(m => `<div class="s25-mon">${m}</div>`).join("")}`;

  let dataRows, note;

  if (appMode === "de") {
    // DE: use region-specific seasonal profile (dynamic, not hardcoded Hannover)
    const profile = getRegionalSeasonProfile();
    const pollenList = [
      {key:"Hasel",icon:"🌰"},{key:"Erle",icon:"🌿"},
      {key:"Esche",icon:"🌳"},{key:"Birke",icon:"🌸"},
      {key:"Graeser",icon:"🌾"},{key:"Roggen",icon:"🌾"},
      {key:"Beifuss",icon:"🌿"},{key:"Ambrosia",icon:"🌼"},
    ];
    dataRows = pollenList.map(p => {
      const vals = profile[p.key] ?? Array(12).fill(0);
      const dimmed = filter.includes(p.key) ? "" : " style=\"opacity:.35\"";
      const cells = vals.map((v,mi) =>
        `<div class="s25-cell" data-v="${v}" title="${MONTHS[mi]}: ${lvLabels[v]??v}"></div>`).join("");
      return `<div class="s25-name" title="${t(p.key)}" onclick="showS25Tip(event,'${t(p.key)}')"${dimmed}>${p.icon}</div>${cells}`;
    }).join("");
    note = t(profile.label);
  } else {
    // EU/US: typical season from POLLEN[x].mo — no regional data available
    dataRows = POLLEN.map(p => {
      const mo = p.mo; // active months (1-based)
      const vals = Array.from({length:12}, (_,i) => {
        const m = i+1;
        if (!mo.includes(m)) return 0;
        // edges = low, middle months = moderate
        const isEdge = m === mo[0] || m === mo[mo.length-1];
        return isEdge ? 1 : 2;
      });
      const dimmed = filter.includes(p.key) ? "" : " style=\"opacity:.35\"";
      const cells = vals.map((v,mi) =>
        `<div class="s25-cell" data-v="${v}" title="${MONTHS[mi]}: ${lvLabels[v]??v}"></div>`).join("");
      return `<div class="s25-name" title="${t(p.key)}" onclick="showS25Tip(event,'${t(p.key)}')"${dimmed}>${p.icon}</div>${cells}`;
    }).join("");
    note = t("season_typical_note");
  }

  return `
    <div class="s25-wrap">
      <div class="s25-grid">
        ${headerRow}
        ${dataRows}
      </div>
      <div class="s25-note">${note}</div>
    </div>`;
}

  document.querySelectorAll(".sym-row").forEach(row => {

  // Speichern-Button wieder einblenden wenn Wert geändert
  if (symSaved) {
    const saved = symptoms[todayISO()];
    const changed = !saved || Object.keys(draft).some(k => draft[k] !== (saved[k] || 0));
    if (changed) {
      symSaved = false;
      const body = document.getElementById("dsym-body");
      if (body && !body.querySelector(".sym-save")) {
        const btn = document.createElement("button");

        body.querySelector(".sym-hist")
          ? body.insertBefore(btn, body.querySelector(".sym-hist"))
          : body.appendChild(btn);
      }
    }
  }

async function loadWeather() {
  const coords = appMode === "de"
    ? (REGION_COORDS[rKey] || {lat:52.37,lon:9.73})
    : {lat: geoInfo?.latitude ?? 52.37, lon: geoInfo?.longitude ?? 9.73};
  const tz    = appMode === "de" ? "Europe%2FBerlin" : "auto";
  const isUS  = appMode === "us";
  const units = isUS
    ? "&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch"
    : "";
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}`
    + `&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,weather_code`
    + `&daily=temperature_2m_max,precipitation_sum,wind_speed_10m_max,uv_index_max`
    + `&timezone=${tz}&forecast_days=7${units}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    weather = {
      current: {
        temp:     Math.round(data.current.temperature_2m),
        humidity: data.current.relative_humidity_2m,
        rain:     data.current.precipitation,
        wind:     Math.round(data.current.wind_speed_10m),
        code:     data.current.weather_code,
      },
      daily: data.daily.time.map((_, i) => ({
        tempMax: Math.round(data.daily.temperature_2m_max[i]),
        rain:    Math.round((data.daily.precipitation_sum[i] ?? 0) * 10) / 10,
        wind:    Math.round(data.daily.wind_speed_10m_max[i]),
        uv:      data.daily.uv_index_max ? Math.round(data.daily.uv_index_max[i]) : null,
      })),
      units: isUS ? {temp:"°F", wind:"mph", rain:"in"} : {temp:"°C", wind:"km/h", rain:"mm"},
      fetchedAt: Date.now(),
    };
  } catch { weather = null; }
  render();
}

function calcPollenEffect(dayIdx) {
  if (!weather) return null;
  const d = weather.daily[dayIdx] ?? weather.daily[0];
  const rain = d.rain ?? 0;
  const wind = d.wind ?? 0;
  const humidity = weather.current.humidity ?? 50;

  if (rain > 2)               return { cls:"risk-none",  icon:"🌧", text:t("effect_rain_heavy") };
  if (wind > 25 && rain < 1)  return { cls:"risk-high",  icon:"💨", text:t("effect_wind_strong") };
  if (wind > 15 && rain < 1)  return { cls:"risk-mid",   icon:"💨", text:t("effect_wind") };
  if (humidity > 80)          return { cls:"risk-low",   icon:"💧", text:t("effect_humid") };
  if (rain > 0.5)             return { cls:"risk-low",   icon:"🌦", text:t("effect_rain_light") };
  return                             { cls:"risk-none",  icon:"☀️", text:t("effect_neutral") };
}

function geoLocate() {
  if (!navigator.geolocation) { showToast(t("geo_unsupported")); return; }
  const btn = document.getElementById("geo-btn");
  btn.disabled = true; btn.textContent = "⏳";
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    let best = null, bestDist = Infinity;
    for (const [key, c] of Object.entries(REGION_COORDS)) {
      const d = Math.hypot(c.lat - lat, c.lon - lon);
      if (d < bestDist) { bestDist = d; best = key; }
    }
    if (best) {
      rKey = best;
      localStorage.setItem(LS.region, rKey);
      const sel = document.getElementById("region-sel");
      if (sel) sel.value = rKey;
      weather = null;
      render();
      loadWeather();
    }
    btn.disabled = false; btn.textContent = "📍";
  }, () => {
    showToast(t("geo_error"));
    btn.disabled = false; btn.textContent = "📍";
  }, { timeout: 8000 });
}

// ─────────────────────────────────────────────────────────────────────────────
// PEARSON CORRELATION COEFFICIENT
// ─────────────────────────────────────────────────────────────────────────────
function pearsonR(xs, ys) {
  const n = xs.length;
  if (n < 3) return 0;
  const meanX = xs.reduce((a,b)=>a+b,0)/n;
  const meanY = ys.reduce((a,b)=>a+b,0)/n;
  let num=0, dx2=0, dy2=0;
  for (let i=0;i<n;i++) {
    const dx=xs[i]-meanX, dy=ys[i]-meanY;
    num+=dx*dy; dx2+=dx*dx; dy2+=dy*dy;
  }
  if (dx2===0||dy2===0) return 0;
  return num/Math.sqrt(dx2*dy2);
}

// ─────────────────────────────────────────────────────────────────────────────

function renderCorrelation() {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 90);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  const symEntries = Object.entries(symptoms).filter(([d]) => d >= cutoffStr);
  const totalDays = symEntries.length;
  if (totalDays < 3) return ""; // need at least 3 days
  const filteredPollen = POLLEN.filter(p => filter.includes(p.key));
  if (!filteredPollen.length) return "";

  const results = [];
  for (const p of filteredPollen) {
    const polScores = [], symScores = [];
    let pollenDays = 0, pollenFreeDays = 0;
    for (const [date, sym] of symEntries) {
      const hist = history[date];
      if (!hist) continue;
      const polLevel = lv(hist[p.key] ?? "-1").sc;
      const symScore = (sym.niesen || 0) + (sym.augen || 0) + (sym.atmung || 0) + (sym.muedigkeit || 0);
      polScores.push(polLevel);
      symScores.push(symScore);
      if (polLevel >= 1) pollenDays++; else pollenFreeDays++;
    }
    const n = polScores.length;
    if (n < 5) {
      // Not enough data — show placeholder
      results.push({ p, r: 0, n, insufficient: true, pollenDays, pollenFreeDays });
      continue;
    }
    // Only compute if we have both pollen days AND pollen-free days
    if (pollenDays < 3 || pollenFreeDays < 3) continue;
    const r = pearsonR(polScores, symScores);
    if (r < 0.1) continue; // skip if no meaningful correlation
    results.push({ p, r, n, insufficient: false, pollenDays, pollenFreeDays });
  }

  if (!results.length) return "";
  const meaningful = results.filter(x => !x.insufficient);
  if (!meaningful.length && results.filter(x=>x.insufficient).length === 0) return "";

  const maxR = meaningful.length ? Math.max(...meaningful.map(x=>x.r)) : 1;

  return `
    <div class="corr-wrap">
      <div class="corr-title">${t("corr_title")}</div>
      ${results.map(({p, r, n, insufficient}) => {
        if (insufficient) {
          return `
            <div class="corr-row">
              <div class="corr-name">${p.icon} ${t(p.key)}</div>
              <div class="corr-no-data">${t("corr_insufficient")} (${n}/5 ${t("corr_n_days")})</div>
            </div>`;
        }
        const pct = Math.round((r/maxR)*100);
        const fillCls = r >= 0.5 ? "corr-fill-high" : r >= 0.3 ? "corr-fill-mid" : "corr-fill-low";
        const label = r < 0.2 ? t("corr_no_link") : `${t("corr_r_val")}=${r.toFixed(2)}`;
        return `
          <div class="corr-row">
            <div class="corr-name">${p.icon} ${t(p.key)}</div>
            ${r < 0.2
              ? `<div class="corr-no-data">${label}</div>`
              : `<div class="corr-track"><div class="corr-fill ${fillCls}" style="width:${pct}%"></div></div>`}
            <div class="corr-r-label">${r < 0.2 ? "" : `${t("corr_r_val")}=${r.toFixed(2)}`}</div>
          </div>
          <div class="corr-n-label" style="padding-left:70px;margin-top:-3px">n = ${n} ${t("corr_n_days")}</div>`;
      }).join("")}
      <div style="font-size:.68rem;color:var(--text3);margin-top:6px">${t("corr_hint")} · ${t("corr_days")}</div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// FORECAST ACCURACY (after 7+ days of history)
// ─────────────────────────────────────────────────────────────────────────────
function renderForecastAccuracy() {
  const allDays = Object.keys(history).sort();
  if (allDays.length < 8) return ""; // need > 7 days
  // Compare history[yesterday][pollen key] = DWD "tomorrow" prediction vs history[today] = actual
  let matched = 0, total = 0;
  for (let i = 0; i < allDays.length - 1; i++) {
    const prevDay = allDays[i];
    const nextDay = allDays[i+1];
    // Only compare consecutive days (1 day apart)
    const d1 = new Date(prevDay + "T12:00"), d2 = new Date(nextDay + "T12:00");
    const diff = (d2 - d1) / 86400000;
    if (diff !== 1) continue;
    // We don't have the "tomorrow" value stored separately, so we approximate:
    // compare today's reading with yesterday's reading as a proxy for trend accuracy
    for (const p of POLLEN) {
      if (!filter.includes(p.key)) continue;
      const prevSc = lv(history[prevDay]?.[p.key] ?? "-1").sc;
      const nextSc = lv(history[nextDay]?.[p.key] ?? "-1").sc;
      if (prevSc < 0 || nextSc < 0) continue;
      // "accurate" if within 1 level
      total++;
      if (Math.abs(prevSc - nextSc) <= 1) matched++;
    }
  }
  if (total < 10) return ""; // not meaningful
  const pct = Math.round((matched / total) * 100);
  return `
    <div class="accuracy-box">
      <span>📊 ${t("accuracy_title")}:</span>
      <span class="accuracy-val">${pct}%</span>
      <span style="font-size:.7rem;color:var(--text3)">(${allDays.length} ${t("accuracy_days")})</span>
    </div>`;
}

function exportData() {
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    symptoms: JSON.parse(localStorage.getItem(LS.syms) || "{}"),
    history:  JSON.parse(localStorage.getItem(LS.hist) || "{}"),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `pollen-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files?.[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.version) throw new Error("invalid");
      if (data.symptoms) localStorage.setItem(LS.syms, JSON.stringify(data.symptoms));
      if (data.history)  localStorage.setItem(LS.hist, JSON.stringify(data.history));
      symptoms = JSON.parse(localStorage.getItem(LS.syms) || "{}");
      history  = JSON.parse(localStorage.getItem(LS.hist) || "{}");
      showToast(t("data_import_ok"));
      render();
    } catch { showToast(t("data_import_err")); }
  };
  reader.readAsText(file);
}

function shareUrl() {
  const flt = filter.join(",");
  const url = `${location.origin}${location.pathname}?rgn=${encodeURIComponent(rKey)}&flt=${encodeURIComponent(flt)}`;
  if (navigator.share) {
    navigator.share({ title: "Pollenflug", url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast("🔗 Link kopiert"));
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ALLERGY SEVERITY
// ─────────────────────────────────────────────────────────────────────────────
function setSeverity(key, level) {
  severity[key] = level;
  localStorage.setItem(LS.sev, JSON.stringify(severity));
  if (level === "off") {
    filter = filter.filter(k => k !== key);
  } else {
    if (!filter.includes(key)) filter.push(key);
  }
  localStorage.setItem(appMode === "de" ? LS.filter : LS.filter + "_" + appMode, JSON.stringify(filter));
  // Update only the affected buttons in-place — drawer stays open
  document.querySelectorAll(`[data-sev-key="${key}"]`).forEach(btn => {
    const active = btn.dataset.sevVal === level;
    btn.style.borderColor  = active ? "var(--accent)" : "var(--border)";
    btn.style.background   = active ? "color-mix(in srgb,var(--accent) 15%,var(--card))" : "transparent";
    btn.style.color        = active ? "var(--text)" : "var(--text3)";
  });
  render();
}

// LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function loadDE() {
  try {
    const res = await fetch("./data.json?v="+Date.now());
    if (!res.ok) throw new Error();
    db = await res.json();
    localStorage.setItem(LS.cache, JSON.stringify(db));
    localStorage.setItem(LS.cache + "_ts", new Date().toISOString());
  } catch {
    const c = localStorage.getItem(LS.cache);
    if (c) {
      db = JSON.parse(c);
      const pill = document.getElementById("offline-pill");
      const tsStr = localStorage.getItem(LS.cache + "_ts");
      if (tsStr) {
        const d = new Date(tsStr);
        const time = d.toLocaleTimeString(lang==="de"?"de-DE":"en-GB",{hour:"2-digit",minute:"2-digit"});
        pill.textContent = `Offline · ${time}`;
      }
      pill.classList.add("show");
    } else {
      document.getElementById("page").innerHTML =
        `<div class="center">${t("no_data")}<br><small>${t("check_conn")}</small></div>`;
      return;
    }
  }

  // Restore DE regionbar (dropdown + geo button)
  document.getElementById("regionbar-inner").innerHTML =
    `<select id="region-sel"></select><button class="geo-btn" id="geo-btn" onclick="geoLocate()" title="${t("geo_title")}">📍</button>`;
  const sel = document.getElementById("region-sel");
  const groups = {};
  for (const r of db.regions) {
    if (!groups[r.region_name]) groups[r.region_name] = [];
    groups[r.region_name].push(r);
  }
  for (const [name, list] of Object.entries(groups)) {
    const g = document.createElement("optgroup");
    g.label = name;
    for (const r of list) {
      const o = document.createElement("option");
      o.value = rk(r); o.textContent = r.partregion_name || r.region_name;
      if (rk(r)===rKey) o.selected = true;
      g.appendChild(o);
    }
    sel.appendChild(g);
  }

  document.getElementById("region-sel").addEventListener("change", e => {
    const val = e.target.value;
    clearTimeout(regionDebounce);
    regionDebounce = setTimeout(() => {
      rKey = val;
      localStorage.setItem(LS.region, rKey);
      weather = null;
      render();
      loadWeather();
    }, 200);
  });

  // store today's history
  const reg = db.regions.find(r=>rk(r)===rKey) ?? db.regions[0];
  storeHistoryDay(reg.pollen);

  render();
  loadWeather(); // läuft parallel, rendert nochmal wenn fertig
}

// ─────────────────────────────────────────────────────────────────────────────
// GLOBAL MODE: Open-Meteo Air Quality
// ─────────────────────────────────────────────────────────────────────────────
async function loadGlobal() {
  const lat = geoInfo.latitude;
  const lon = geoInfo.longitude;
  const vars = OM_VARS[appMode];
  const locName = [geoInfo.city, geoInfo.country].filter(Boolean).join(", ");

  // Regionbar: location name + relocate button
  document.getElementById("regionbar-inner").innerHTML =
    `<span style="font-size:.84rem;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📍 ${escapeHtml(locName)}</span>
     <button class="geo-btn" onclick="relocate()" title="${t("reloc_btn")}">🔄</button>`;

  const url = `https://air-quality-api.open-meteo.com/v1/air-quality`
    + `?latitude=${lat}&longitude=${lon}`
    + `&hourly=${vars.join(",")}`
    + `&forecast_days=3&timezone=auto`;

  let raw = null;
  let pollenAvailable = false;

  try {
    const res = await fetch(url);
    const json = await res.json();
    // API returns {error:true} when variables unsupported for region
    if (!json.error && json.hourly) {
      // Check if any pollen variable has actual (non-null) data
      pollenAvailable = vars.some(v => json.hourly[v]?.some(x => x !== null && x > 0));
      raw = json;
      localStorage.setItem(LS.cache + "_om", JSON.stringify({raw, ts: Date.now(), lat, lon}));
    }
  } catch {
    const cached = localStorage.getItem(LS.cache + "_om");
    if (cached) {
      const c = JSON.parse(cached);
      raw = c.raw;
      pollenAvailable = vars.some(v => raw.hourly?.[v]?.some(x => x !== null && x > 0));
      const pill = document.getElementById("offline-pill");
      pill.textContent = t("offline");
      pill.classList.add("show");
    }
  }

  // Build pollen data: real values if available, else all "-1" (no data)
  const dayKeys = ["today", "tomorrow", "dayafter_to"];
  const pollen = {};
  const dates = [];

  if (pollenAvailable && raw?.hourly?.time) {
    const byDate = {};
    raw.hourly.time.forEach((ts, i) => {
      const date = ts.slice(0, 10);
      const hour = parseInt(ts.slice(11, 13));
      if (hour < 6 || hour > 20) return;
      if (!byDate[date]) byDate[date] = {};
      for (const v of vars) {
        const key = OM_KEY[v];
        const val = raw.hourly[v]?.[i] ?? 0;
        byDate[date][key] = Math.max(byDate[date][key] ?? 0, val);
      }
    });
    dates.push(...Object.keys(byDate).sort().slice(0, 3));
    for (const p of POLLEN) {
      pollen[p.key] = {};
      dayKeys.forEach((dk, di) => {
        const date = dates[di];
        if (!date) { pollen[p.key][dk] = "-1"; return; }
        const v = byDate[date]?.[p.key] ?? 0;
        const [t1, t2] = OM_THR[p.key] ?? [10, 50];
        pollen[p.key][dk] = v <= 0 ? "0" : v < t1 ? "1" : v < t2 ? "2" : "3";
      });
    }
  } else {
    // No pollen data for this region — fill with "-1" (unknown)
    for (const p of POLLEN) {
      pollen[p.key] = Object.fromEntries(dayKeys.map(dk => [dk, "-1"]));
    }
  }

  db = {
    last_update: dates[0] ?? todayISO(),
    next_update: "",
    pollen_available: pollenAvailable,
    regions: [{ region_id:0, partregion_id:-1, region_name: locName, partregion_name:"", pollen }],
  };
  rKey = "0--1";

  const validKeys = POLLEN.map(p => p.key);
  filter = (JSON.parse(localStorage.getItem(LS.filter + "_" + appMode) || "null") ?? validKeys)
    .filter(k => validKeys.includes(k));
  if (!filter.length) filter = [...validKeys];

  storeHistoryDay(pollen);
  render();
  loadWeather();
}

async function relocate() {
  if (!navigator.geolocation) { showToast(t("geo_unsupported")); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    geoInfo.latitude  = pos.coords.latitude;
    geoInfo.longitude = pos.coords.longitude;
    weather = null;
    await loadGlobal();
  }, () => showToast(t("geo_error")), { timeout: 8000 });
}

async function init() {
  // Manual override takes priority over auto-detection
  const manualMode = localStorage.getItem(LS.mode); // "de"|"eu"|"us"|null

  // Only fetch geoInfo once per session; reuse if already set
  if (!geoInfo) {
    try {
      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 5000);
      const res = await fetch("https://ipwho.is/", { signal: ctrl.signal });
      const json = await res.json();
      // success:false means unrecognised IP (VPN/datacenter) — still use coords if present
      geoInfo = (json.success !== false && json.country_code)
        ? json
        : { ...json, country_code: json.country_code || "DE" };
    } catch {
      geoInfo = { country_code:"DE", latitude:52.37, longitude:9.73, city:"", country:"Germany" };
    }
  }

  const autoCC = (geoInfo.country_code || "DE").toUpperCase();
  const resolvedMode = manualMode ?? (autoCC === "DE" ? "de" : (autoCC === "US" || autoCC === "CA" || autoCC === "MX") ? "us" : "eu");

  if (resolvedMode === "de") {
    appMode = "de";
    POLLEN  = POLLEN_DE;
    // Restore filter for DE
    filter = JSON.parse(localStorage.getItem(LS.filter) || "null") || POLLEN.map(p => p.key);
    filter = filter.filter(k => POLLEN.some(p => p.key === k));
    if (!filter.length) filter = POLLEN.map(p => p.key);
    await loadDE();
  } else {
    appMode = resolvedMode; // "eu" or "us"
    POLLEN  = appMode === "us" ? POLLEN_US : POLLEN_EU;
    try {
      await loadGlobal();
    } catch(e) {
      document.getElementById("page").innerHTML =
        `<div class="center">${t("no_data")}<br><small>${t("check_conn")}</small></div>`;
    }
  }

  // Apply URL params
  const urlParams = new URLSearchParams(location.search);
  const urlRgn = urlParams.get("rgn");
  if (urlRgn && db?.regions?.find(r => rk(r) === urlRgn)) {
    rKey = urlRgn;
    localStorage.setItem(LS.region, rKey);
    render();
  }
  const urlFlt = urlParams.get("flt");
  if (urlFlt) {
    const validKeys = POLLEN.map(p => p.key);
    const parsed = urlFlt.split(",").filter(k => validKeys.includes(k));
    if (parsed.length > 0) {
      filter = parsed;
      localStorage.setItem(appMode === "de" ? LS.filter : LS.filter + "_" + appMode, JSON.stringify(filter));
      render();
    }
  }
}

function setDataSource(mode) {
  if (mode === "auto") {
    localStorage.removeItem(LS.mode);
    geoInfo = null; // force fresh IP lookup for auto-detection
  } else {
    localStorage.setItem(LS.mode, mode);
  }
  // Reset filter so new mode starts with all pollen selected
  localStorage.removeItem(LS.filter);
  filter = [];
  closeDrawer();
  weather = null;
  document.getElementById("page").innerHTML =
    `<div class="center"><div class="spin"></div><span>${t("locating")}</span></div>`;
  init();
}

// ── PULL-TO-REFRESH + SWIPE (unified to prevent gesture conflict) ─────────────
let ptr_startY = 0, ptr_pulling = false;
let swipe_startX = 0, swipe_startY = 0;
let gesture_dir = null; // "v" = vertical PTR, "h" = horizontal swipe, null = undecided

const ptr_el = document.createElement("div");
ptr_el.id = "ptr";
ptr_el.innerHTML = `<div id="ptr-icon">↓</div>`;
ptr_el.style.cssText = `
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; justify-content:center; align-items:center;
  height:0; overflow:hidden; transition:height .15s;
  background:var(--card); border-bottom:1px solid var(--border);
  font-size:.85rem; color:var(--text2);
`;
document.body.prepend(ptr_el);

document.addEventListener("touchstart", e => {
  const touch = e.touches[0];
  swipe_startX = touch.clientX;
  swipe_startY = touch.clientY;
  ptr_startY = window.scrollY < 5 ? touch.clientY : 0;
  gesture_dir = null;
}, { passive: true });

document.addEventListener("touchmove", e => {
  if (!ptr_startY) return;
  const dx = Math.abs(e.touches[0].clientX - swipe_startX);
  const dy = e.touches[0].clientY - ptr_startY;
  // lock gesture direction once we know it
  if (gesture_dir === null && (Math.abs(dy) > 5 || dx > 5)) {
    gesture_dir = Math.abs(dy) > dx ? "v" : "h";
  }
  if (gesture_dir === "v" && dy > 4 && window.scrollY < 5) {
    ptr_pulling = true;
    const h = Math.min(dy * 0.75, 52);
    ptr_el.style.height = h + "px";
    ptr_el.querySelector("#ptr-icon").textContent = h >= 28 ? t("ptr_release") : t("ptr_pull");
  }
}, { passive: true });

document.addEventListener("touchend", e => {
  if (gesture_dir === "v") {
    if (ptr_pulling && parseInt(ptr_el.style.height) >= 28) {
      ptr_el.style.height = "42px";
      ptr_el.querySelector("#ptr-icon").textContent = t("ptr_loading");
      init().finally(() => { ptr_el.style.height = "0"; });
    } else {
      ptr_el.style.height = "0";
    }
  } else {
    // swipe left/right for day navigation
    const dx = e.changedTouches[0].clientX - swipe_startX;
    const dy = e.changedTouches[0].clientY - swipe_startY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0 && activeDay < 2) setDay(activeDay + 1);
      if (dx > 0 && activeDay > 0) setDay(activeDay - 1);
    }
  }
  ptr_startY = 0; ptr_pulling = false; gesture_dir = null;
}, { passive: true });

// ── SWIPE TO CLOSE DRAWER ────────────────────────────────────────────────────
let dswipe_startX = 0;
document.getElementById("drawer").addEventListener("touchstart", e => {
  dswipe_startX = e.touches[0].clientX;
}, { passive: true });
document.getElementById("drawer").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - dswipe_startX;
  if (dx < -50) closeDrawer();
}, { passive: true });

// ─────────────────────────────────────────────────────────────────────────────
// IMPROVED BEST TIME OUTSIDE (hourly pattern)
// Replaces wind-only estimation with morning-low/midday-high pattern
// ─────────────────────────────────────────────────────────────────────────────
// Override calcBestTimes with an improved version that uses pollen dispersion patterns
(function() {
  const _orig = calcBestTimes;
  window.calcBestTimes = function(pol, dayIdx) {
    const wd = weather?.daily?.[dayIdx];
    if (!wd) return null;
    const risk = personalRisk(pol, dayIdx).max;
    const wind = wd.wind ?? 0, rain = wd.rain ?? 0, uv = wd.uv ?? 0;

    if (risk === 0) return { good: [t("besttime_allday")], avoid: null };

    // Pollen dispersal: low early morning (06-09), peaks midday (10-16), drops evening (19-22)
    // Rain suppresses, wind amplifies
    const good = [], avoid_slots = [];

    // Morning window: generally good unless strong wind + dry
    const morningGood = !(wind > 25 && rain < 0.5 && risk >= 2);
    if (morningGood && risk <= 2) good.push("06:00–09:00");

    // Evening window: generally better (pollen settles)
    const eveningGood = risk < 3 || rain > 1;
    if (eveningGood) good.push("19:00–22:00");

    // Midday is usually worst if high pollen + dry + UV
    if (uv > 4 && risk >= 2 && rain < 1) avoid_slots.push("10:00–17:00");
    else if (risk >= 3 && wind > 20) avoid_slots.push("11:00–16:00");

    if (risk >= 3 && wind > 25 && rain < 0.5) return { good: [], avoid: t("besttime_none") };

    return { good, avoid: avoid_slots[0] ?? null };
  };
})();
