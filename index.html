<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff" id="theme-meta">
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pollenflug">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>Pollenflug</title>
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:      #f6f6f7;
      --card:    #ffffff;
      --card2:   #f9f9fa;
      --border:  #e4e4e7;
      --text:    #09090b;
      --text2:   #71717a;
      --text3:   #a1a1aa;
      --accent:  #16a34a;
      --r:       13px;
      --sh:      0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    }
    [data-theme="dark"] {
      --bg:     #0a0a0b;
      --card:   #18181b;
      --card2:  #27272a;
      --border: #3f3f46;
      --text:   #fafafa;
      --text2:  #a1a1aa;
      --text3:  #71717a;
      --accent: #4ade80;
      --sh:     0 1px 3px rgba(0,0,0,.5);
    }

    /* ── BASE ────────────────────────────────────────── */
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .2s, color .2s;
      min-height: 100vh;
    }
    button, select { font-family: inherit; }

    /* ── HEADER ──────────────────────────────────────── */
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 99;
      padding: 0 16px;
    }
    .topbar-inner {
      max-width: 640px; margin: 0 auto;
      height: 52px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo { font-weight: 700; font-size: 1rem; flex: 1; letter-spacing: -.2px; }
    .logo em { color: var(--accent); font-style: normal; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card2); color: var(--text);
      cursor: pointer; font-size: .95rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--border); }
    .offline-pill {
      font-size: .7rem; background: #f97316; color: #fff;
      padding: 2px 9px; border-radius: 20px; display: none;
    }
    .offline-pill.show { display: inline-block; }

    /* region bar */
    .regionbar {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
    }
    .regionbar-inner { max-width: 640px; margin: 0 auto; }
    .regionbar select {
      width: 100%;
      background: var(--card2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 7px 12px; font-size: .84rem; outline: none; cursor: pointer;
    }
    .regionbar select:focus { border-color: var(--accent); }

    /* ── PAGE ────────────────────────────────────────── */
    .page { max-width: 640px; margin: 0 auto; padding: 14px 14px 80px; }

    /* ── UPDATE LINE ─────────────────────────────────── */
    .update-line {
      font-size: .73rem; color: var(--text3);
      text-align: center; padding: 6px 0 10px;
    }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh);
      margin-bottom: 12px; overflow: hidden;
    }
    .card-head {
      padding: 13px 16px 11px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .card-head.collapsible { cursor: pointer; user-select: none; border-bottom: none; }
    .card-head.collapsible.open { border-bottom: 1px solid var(--border); }
    .card-title { font-size: .78rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .card-action { font-size: .78rem; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }
    .collapse-arrow { font-size: .75rem; color: var(--text3); transition: transform .2s; }
    .card-head.collapsible.open .collapse-arrow { transform: rotate(180deg); }
    .collapsible-body { display: none; }
    .collapsible-body.open { display: block; }

    /* ── HERO (personal risk) ────────────────────────── */
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh);
      margin-bottom: 12px; padding: 22px 18px;
      display: flex; align-items: center; gap: 16px;
    }
    .hero-badge {
      width: 64px; height: 64px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; flex-shrink: 0; font-weight: 800;
      background: transparent !important;
    }
    .dc-ring { background: transparent !important; }
    .hero-body { flex: 1; min-width: 0; }
    .hero-risk { font-size: 1.25rem; font-weight: 700; line-height: 1.2; background: transparent !important; }
    .hero-loc  { font-size: .8rem; color: var(--text2); margin-top: 2px; }
    .hero-drivers { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
    .driver-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: .78rem; font-weight: 500;
      background: transparent !important;
    }

    /* colour tokens per level */
    .risk-none   { --rc:#16a34a; --rb:#dcfce7; }
    .risk-low    { --rc:#a16207; --rb:#fef9c3; }
    .risk-mid    { --rc:#c2410c; --rb:#ffedd5; }
    .risk-high   { --rc:#b91c1c; --rb:#fee2e2; }
    [data-theme="dark"] .risk-none  { --rc:#4ade80; --rb:#052e16; }
    [data-theme="dark"] .risk-low   { --rc:#fde047; --rb:#1c1400; }
    [data-theme="dark"] .risk-mid   { --rc:#fb923c; --rb:#1c0a00; }
    [data-theme="dark"] .risk-high  { --rc:#f87171; --rb:#1c0000; }
    .risk-none,.risk-low,.risk-mid,.risk-high {
      color: var(--rc); background: var(--rb);
    }

    /* ── 3-DAY STRIP ─────────────────────────────────── */
    .days-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .day-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh);
      padding: 12px 10px; text-align: center; cursor: pointer;
      transition: border-color .15s;
    }
    .day-card.active { border-color: var(--accent); }
    .day-card .dc-label { font-size: .78rem; font-weight: 600; color: var(--text); }
    .day-card .dc-date  { font-size: .68rem; color: var(--text3); margin-top: 1px; }
    .day-card .dc-ring  {
      width: 36px; height: 36px; border-radius: 50%;
      margin: 9px auto 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700;
    }
    .day-card .dc-sub { font-size: .68rem; color: var(--text2); }

    /* ── ALLERGEN SELECTOR ───────────────────────────── */
    .allergy-grid { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 14px 14px; }
    .allergy-chip {
      padding: 7px 13px; border-radius: 10px;
      font-size: .82rem; cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card2); color: var(--text2);
      display: flex; align-items: center; gap: 6px;
      transition: all .12s; user-select: none;
    }
    .allergy-chip.on {
      background: #dcfce7;
      color: #15803d;
      border-color: #16a34a;
      font-weight: 500;
    }
    [data-theme="dark"] .allergy-chip.on {
      background: #052e16;
      color: #4ade80;
      border-color: #4ade80;
    }

    /* ── POLLEN TABLE ────────────────────────────────── */
    .ptable { width: 100%; border-collapse: collapse; }
    .ptable th {
      padding: 9px 11px; font-size: .73rem; font-weight: 500;
      color: var(--text2); border-bottom: 1px solid var(--border);
      background: var(--card2); text-align: center;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .ptable th:first-child { text-align: left; }
    .ptable td {
      padding: 9px 11px; font-size: .84rem;
      border-bottom: 1px solid var(--border); text-align: center;
      vertical-align: middle;
    }
    .ptable td:first-child { text-align: left; }
    .ptable tr:last-child td { border-bottom: none; }
    .ptable tr.dim { opacity: .35; }
    .ptable tr.active-row td:first-child { border-left: 3px solid var(--accent); }
    .pname  { font-weight: 500; font-size: .86rem; }
    .picon  { font-size: 1rem; margin-right: 5px; }
    .ps     { font-size: .68rem; display: block; margin-top: 1px; }
    .ps.on  { color: var(--accent); }
    .ps.off { color: var(--text3); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: .76rem; font-weight: 500;
    }
    .b-none { color: var(--text3); }
    .b-low  { background:#fef9c3; color:#a16207; }
    .b-mid  { background:#ffedd5; color:#c2410c; }
    .b-high { background:#fee2e2; color:#b91c1c; }
    [data-theme="dark"] .b-low  { background:#1c1400; color:#fde047; }
    [data-theme="dark"] .b-mid  { background:#1c0a00; color:#fb923c; }
    [data-theme="dark"] .b-high { background:#1c0000; color:#f87171; }
    .col-hi { font-weight: 600; }

    /* ── HISTORY CHART ───────────────────────────────── */
    .history-wrap { padding: 12px 14px 14px; }
    .hist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .hist-name { width: 60px; font-size: .78rem; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-bars { display: flex; gap: 3px; flex: 1; align-items: flex-end; height: 28px; }
    .hist-bar  {
      flex: 1; border-radius: 3px 3px 0 0;
      min-height: 4px;
      position: relative;
    }
    .hist-bar[data-v="0"]  { background: var(--border); height: 4px; }
    .hist-bar[data-v="1"]  { background: #eab308; height: 40%; }
    .hist-bar[data-v="2"]  { background: #f97316; height: 70%; }
    .hist-bar[data-v="3"]  { background: #ef4444; height: 100%; }
    .hist-bar[data-v="-1"] { background: var(--border); height: 4px; opacity:.4; }
    .hist-dates { display: flex; gap: 3px; padding-left: 68px; margin-bottom: 2px; }
    .hist-dt { flex: 1; font-size: .62rem; color: var(--text3); text-align: center; }

    /* ── SYMPTOM TRACKER ─────────────────────────────── */
    .sym-date { font-size: .76rem; color: var(--text2); padding: 8px 14px 4px; }
    .sym-row  {
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      border-top: 1px solid var(--border);
    }
    .sym-icon  { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
    .sym-label { font-size: .84rem; width: 70px; flex-shrink: 0; }
    .sym-scale { display: flex; gap: 4px; flex: 1; }
    .sym-btn {
      flex: 1; padding: 6px 2px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--text); font-size: .78rem; cursor: pointer;
      transition: all .1s;
    }
    .sym-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    [data-theme="dark"] .sym-btn.on { color: #000; }
    .sym-save {
      display: block; margin: 10px 14px;
      width: calc(100% - 28px); padding: 10px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
    }
    [data-theme="dark"] .sym-save { color: #000; }
    .sym-save:hover { opacity: .85; }
    .sym-hist { padding: 8px 14px 12px; border-top: 1px solid var(--border); }
    .sym-hist-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); margin-bottom: 7px; }
    .sym-hist-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: .76rem; }
    .sym-hist-date { width: 42px; color: var(--text3); flex-shrink: 0; }
    .sym-dot { width: 19px; height: 19px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .65rem; font-weight: 700; }

    /* ── SEASON CAL ──────────────────────────────────── */
    .season-wrap { padding: 10px 14px 14px; }
    .season-mhead { display: flex; gap: 2px; margin-left: 66px; margin-bottom: 5px; }
    .season-ml { flex: 1; text-align: center; font-size: .58rem; color: var(--text3); }
    .season-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .season-name { width: 60px; font-size: .78rem; flex-shrink: 0; }
    .season-bar { flex: 1; display: flex; gap: 2px; }
    .sm { flex: 1; height: 8px; border-radius: 3px; background: var(--border); }
    .sm.on  { background: var(--accent); opacity: .5; }
    .sm.now { background: var(--accent); opacity: 1; outline: 2px solid var(--accent); outline-offset: 1px; }

    /* ── LEGEND ──────────────────────────────────────── */
    .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; padding: 10px 14px 14px; }
    .li { display: flex; align-items: center; gap: 8px; font-size: .81rem; }
    .ld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── LOADER / ERROR ──────────────────────────────── */
    .center { text-align: center; padding: 60px 20px; color: var(--text2); }
    .spin { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 12px; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* ── GEO BUTTON ──────────────────────────────────── */
    .regionbar-inner { display: flex; gap: 6px; align-items: center; }
    .geo-btn {
      flex-shrink: 0; padding: 7px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--text2); cursor: pointer; font-size: .84rem;
      white-space: nowrap;
    }
    .geo-btn:hover { background: var(--border); }
    .geo-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── SWIPE DOTS ───────────────────────────────────── */
    .swipe-dots { display: flex; justify-content: center; gap: 6px; margin: -4px 0 8px; }
    .swipe-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .2s; }
    .swipe-dot.active { background: var(--accent); }

    /* ── WEEK WEATHER ────────────────────────────────── */
    .week-strip { padding: 0 14px 12px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .week-strip::-webkit-scrollbar { display: none; }
    .week-day {
      flex: 0 0 auto; min-width: 52px; text-align: center;
      padding: 7px 5px; border-radius: 9px; background: var(--card2);
      border: 1px solid var(--border);
    }
    .week-day.today-wk { border-color: var(--accent); }
    .wd-name { font-size: .62rem; color: var(--text3); font-weight: 600; text-transform: uppercase; }
    .wd-icon { font-size: .95rem; margin: 3px 0; }
    .wd-temp { font-size: .8rem; font-weight: 700; }
    .wd-rain { font-size: .62rem; color: var(--text3); margin-top: 1px; }
    .wd-uv   { font-size: .6rem; color: var(--text3); margin-top: 1px; }
    .uv-hi   { color: #b91c1c; }
    .uv-mid  { color: #c2410c; }
    .uv-low  { color: #a16207; }

    /* ── CORRELATION ─────────────────────────────────── */
    .corr-wrap { padding: 10px 14px 14px; border-top: 1px solid var(--border); }
    .corr-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .4px; color: var(--text3); margin-bottom: 8px; }
    .corr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .corr-name { width: 62px; font-size: .78rem; flex-shrink: 0; }
    .corr-track { flex: 1; background: var(--border); border-radius: 4px; height: 7px; overflow: hidden; }
    .corr-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .corr-lbl { font-size: .7rem; color: var(--text3); width: 28px; text-align: right; flex-shrink: 0; }

    /* ── DRAWER ──────────────────────────────────────── */
    #drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    #drawer-overlay.show { opacity: 1; pointer-events: all; }
    #drawer {
      position: fixed; top: 0; left: 0; height: 100%;
      width: min(300px, 85vw);
      background: var(--card); z-index: 201;
      transform: translateX(-100%);
      transition: transform .28s ease;
      overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,.18);
    }
    #drawer.open { transform: translateX(0); }
    #drawer-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: .95rem;
      position: sticky; top: 0; background: var(--card); z-index: 1;
    }
    #drawer-head button {
      background: none; border: none; font-size: 1.2rem;
      cursor: pointer; color: var(--text2); padding: 2px 6px;
    }
    .dsec-head {
      padding: 12px 16px; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--border);
      font-size: .78rem; font-weight: 600;
      color: var(--text2); text-transform: uppercase; letter-spacing: .5px;
    }
    .dsec-arrow { font-size: .75rem; color: var(--text3); transition: transform .2s; }
    .dsec-head.open .dsec-arrow { transform: rotate(180deg); }
    .dsec-body { display: none; }
    .dsec-body.open { display: block; }
  </style>
</head>
<body>

<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-head">
    <span id="drawer-head-title">Menü</span>
    <button onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawer-content"></div>
</div>

<div class="topbar">
  <div class="topbar-inner">
    <button class="icon-btn" onclick="openDrawer()" aria-label="Menü">☰</button>
    <div class="logo">🌿 <em>Pollen</em>flug</div>
    <span class="offline-pill" id="offline-pill">Offline</span>
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="regionbar">
    <div class="regionbar-inner">
      <select id="region-sel"><option>Lade Regionen…</option></select>
      <button class="geo-btn" id="geo-btn" onclick="geoLocate()">📍</button>
    </div>
  </div>
</div>

<div class="page" id="page">
  <div class="center"><div class="spin"></div>Lade DWD-Daten…</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// I18N
// ─────────────────────────────────────────────────────────────────────────────
const lang = (navigator.language || "de").toLowerCase().startsWith("de") ? "de" : "en";
function t(key) { return STRINGS[lang][key] ?? STRINGS.de[key] ?? key; }

const STRINGS = {
  de: {
    // days
    today:"Heute", tomorrow:"Morgen", dayafter:"Übermorgen",
    // risk levels
    risk0:"Keine Belastung", risk1:"Geringe Belastung", risk2:"Mittlere Belastung", risk3:"Hohe Belastung",
    // pollen levels
    lv_none:"keine", lv_low:"gering", lv_mid:"mittel", lv_high:"hoch",
    lv_none_low:"keine–gering", lv_low_mid:"gering–mittel", lv_mid_high:"mittel–hoch",
    // pollen names
    Hasel:"Hasel", Erle:"Erle", Esche:"Esche", Birke:"Birke",
    Graeser:"Gräser", Roggen:"Roggen", Beifuss:"Beifuß", Ambrosia:"Ambrosia",
    // seasons
    s_Hasel:"Jan–Mär", s_Erle:"Feb–Apr", s_Esche:"Mär–Mai", s_Birke:"Mär–Mai",
    s_Graeser:"Mai–Aug", s_Roggen:"Mai–Jul", s_Beifuss:"Jul–Sep", s_Ambrosia:"Aug–Okt",
    // months
    months:"Jan,Feb,Mär,Apr,Mai,Jun,Jul,Aug,Sep,Okt,Nov,Dez",
    // ui
    menu:"Menü", close:"✕", offline:"Offline",
    loading:"Lade DWD-Daten…", no_data:"❌ Keine Daten verfügbar.",
    check_conn:"Bitte Verbindung prüfen.",
    dwd_stand:"Stand", next_update:"Nächstes Update",
    region:"Region", geo_title:"Nächste Region automatisch wählen",
    weather_title:"Wetter & Polleneinfluss",
    temp:"Temp", wind:"Wind", humidity:"Feuchte", rain:"Regen", uv:"UV max",
    all_pollen:"Alle Pollen", select_all:"Alle auswählen",
    tap_hint:"Zeile antippen = für dein Risiko ein/ausschließen",
    history_title:"Verlauf – letzte", days:"Tage",
    sym_title:"Wie geht's dir heute?",
    niesen:"Niesen", augen:"Augen", atmung:"Atmung", muedigkeit:"Müdigkeit",
    save:"Speichern", saved_entries:"Letzte Einträge",
    season_title:"Saisonkalender",
    legend_title:"Legende",
    risk_calc_title:"Wie wird dein Risiko berechnet?",
    risk_calc_body:"Das <strong>persönliche Risiko</strong> oben entspricht dem <strong>höchsten Einzelwert</strong> deiner ausgewählten Pollen (grüner Rand in der Tabelle).<br><br>Beispiel: Hasel = gering, Erle = hoch → Risiko = <strong>hoch</strong>.",

function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  document.getElementById("theme-btn").textContent = t==="dark" ? "☀️" : "🌙";
  document.getElementById("theme-meta").content = t==="dark" ? "#18181b" : "#ffffff";
}
function toggleTheme() {
  const t = document.documentElement.dataset.theme==="dark" ? "light" : "dark";
  localStorage.setItem(LS.theme,t); applyTheme(t);
}
applyTheme(localStorage.getItem(LS.theme) ||
  (window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light"));

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const todayISO = () => new Date().toISOString().slice(0,10);
function dStr(n) {
  const d=new Date(); d.setDate(d.getDate()+n);
  return d.toLocaleDateString(lang==="de"?"de-DE":"en-GB",{weekday:"short",day:"2-digit",month:"2-digit"});
}
function lv(v)  { return LV[String(v)] ?? {cls:"b-none",sc:0,label:String(v),rc:"none"}; }
function rk(r)  { return `${r.region_id}-${r.partregion_id}`; }
function region(){ return db.regions.find(r=>rk(r)===rKey) ?? db.regions[0]; }

function personalRisk(pol, dayIdx) {
  let max=0; const drivers=[];
  for (const p of POLLEN) {
    if (!filter.includes(p.key)) continue;
    const l = lv(pol?.[p.key]?.[DAYS[dayIdx]]??"-1");
    if (l.sc>0) drivers.push({...p, pillCls:["risk-none","risk-low","risk-mid","risk-high"][l.sc]});
    if (l.sc>max) max=l.sc;
  }
  return { ...RISK[max], max, drivers };
}

// ─────────────────────────────────────────────────────────────────────────────
// HISTORY: store today's data in localStorage
// ─────────────────────────────────────────────────────────────────────────────
function storeHistoryDay(pol) {
  const today = todayISO();
  if (history[today]) return; // already stored today
  const entry = {};
  for (const p of POLLEN) {
    entry[p.key] = pol?.[p.key]?.today ?? "-1";
  }
  history[today] = entry;
  // keep only last 14 days
  const keys = Object.keys(history).sort().slice(-14);
  const trimmed = {};
  keys.forEach(k => trimmed[k] = history[k]);
  history = trimmed;
  localStorage.setItem(LS.hist, JSON.stringify(history));
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const reg   = region();
  const pol   = reg.pollen;
  const month = new Date().getMonth()+1;
  const risk  = personalRisk(pol, activeDay);

  // pre-fill draft from today's saved entry
  const ts = symptoms[todayISO()];
  if (ts) draft = {niesen:ts.niesen, augen:ts.augen, atmung:ts.atmung, muedigkeit:ts.muedigkeit||0};

  const dayScores = DAYS.map((_,i) => personalRisk(pol,i).max);

  const _open = new Set(openSections);
  document.getElementById("page").innerHTML = `

    <!-- UPDATE LINE -->
    <div style="font-size:.72rem;color:var(--text3);text-align:center;padding:4px 0 10px">
      ${[db.last_update&&`${t("dwd_stand")}: ${db.last_update}`, db.next_update&&`${t("next_update")}: ${db.next_update}`].filter(Boolean).join(" · ")}
    </div>

    <!-- HERO: personal risk -->
    ${(() => {
      const todayScore = personalRisk(pol, 0).max;
      const tomorrowScore = personalRisk(pol, 1).max;
      const trend = activeDay === 0
        ? (tomorrowScore > todayScore ? "↑" : tomorrowScore < todayScore ? "↓" : "→")
        : "";
      const trendLabel = activeDay === 0
        ? (tomorrowScore > todayScore ? t("trend_rising") : tomorrowScore < todayScore ? t("trend_falling") : t("trend_stable"))
        : "";
      return `
    <div class="hero">
      <div class="hero-badge ${risk.cls}" style="font-size:1.6rem;font-weight:800">
        ${["✓","!","!!","‼"][risk.max]}
      </div>
      <div class="hero-body">
        <div class="hero-risk ${risk.cls}" style="font-size:1.4rem">
          ${risk.label}${trend ? ` <span style="font-size:1rem;opacity:.8">${trend}</span>` : ""}
        </div>
        ${trendLabel ? `<div style="font-size:.76rem;color:var(--text2);margin-top:1px">${t("tendency")}: ${trendLabel}</div>` : ""}
        <div class="hero-loc">${reg.region_name}${reg.partregion_name?` · ${reg.partregion_name}`:""} · ${DAY_NAMES[activeDay]}</div>
        ${risk.drivers.length ? `
          <div class="hero-drivers">
            ${risk.drivers.map(p=>`<span class="driver-pill ${p.pillCls}">${p.icon} ${t(p.key)}</span>`).join("")}
          </div>` : `<div style="font-size:.8rem;color:var(--text2);margin-top:5px">${t("no_load")}</div>`}
      </div>
    </div>`;
    })()}

    <!-- WEATHER CARD -->
    ${weather ? (() => {
      const w = weather.current;
      const effect = calcPollenEffect(activeDay);
      const d = weather.daily[activeDay] ?? weather.daily[0];
      const uvVal = d.uv ?? null;
      const uvCls = uvVal === null ? "" : uvVal >= 8 ? "uv-hi" : uvVal >= 5 ? "uv-mid" : uvVal >= 2 ? "uv-low" : "";
      function uvCat(v) { return v === null ? "" : v <= 2 ? t("uv_low") : v <= 5 ? t("uv_moderate") : v <= 7 ? t("uv_high") : v <= 10 ? t("uv_very_high") : t("uv_extreme"); }
      const uvLabel = uvVal === null ? "–" : `${uvVal} <span style="font-size:.65rem;font-weight:400">(${uvCat(uvVal)})</span>`;
      const fetchedStr = weather.fetchedAt
        ? new Date(weather.fetchedAt).toLocaleTimeString(lang==="de"?"de-DE":"en-GB",{hour:"2-digit",minute:"2-digit"})
        : "";
      // week day names
      const wkNames = lang==="de" ? ["Mo","Di","Mi","Do","Fr","Sa","So"] : ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      function wkIcon(rain, wind) {
        if (rain > 3) return "🌧";
        if (rain > 0.5) return "🌦";
        if (wind > 25) return "💨";
        return "☀️";
      }
      return `
      <div class="card" style="margin-bottom:12px">
        <div class="card-head">
          <span class="card-title">${t("weather_title")}</span>
          <span style="font-size:.72rem;color:var(--text3)">${fetchedStr ? `Stand ${fetchedStr} · ` : ""}Open-Meteo</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;padding:12px 14px 6px;text-align:center">
          ${[["🌡",t("temp"),`${w.temp}°C`],["💨",t("wind"),`${d.wind} km/h`],["💧",t("humidity"),`${w.humidity}%`],["🌧",t("rain"),`${d.rain} mm`],["☀️",t("uv"),`<span class="${uvCls}">${uvLabel}</span>`]].map(([ic,lb,val])=>`
          <div style="padding:4px 1px">
            <div style="font-size:1.1rem">${ic}</div>
            <div style="font-size:.95rem;font-weight:700;margin:2px 0">${val}</div>
            <div style="font-size:.63rem;color:var(--text3)">${lb}</div>
          </div>`).join("")}
        </div>
        <div style="margin:4px 14px 10px;padding:9px 12px;border-radius:9px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;gap:10px">
          <span style="font-size:1.3rem">${effect.icon}</span>
          <span style="font-size:.83rem;font-weight:500">${effect.text}</span>
        </div>
        ${weather.daily.length > 3 ? `
        <div class="week-strip">
          ${weather.daily.map((wd, i) => {
            const dt = new Date(); dt.setDate(dt.getDate() + i);
            const dayName = wkNames[dt.getDay() === 0 ? 6 : dt.getDay() - 1];
            const uvW = wd.uv ?? null;
            const uvWCls = uvW === null ? "" : uvW >= 8 ? "uv-hi" : uvW >= 5 ? "uv-mid" : uvW >= 2 ? "uv-low" : "";
            return `<div class="week-day${i===0?" today-wk":""}">
              <div class="wd-name">${i===0?t("today"):dayName}</div>
              <div class="wd-icon">${wkIcon(wd.rain, wd.wind)}</div>
              <div class="wd-temp">${wd.tempMax}°</div>
              <div class="wd-rain">${wd.rain > 0 ? wd.rain+"mm" : "–"}</div>
              ${uvW !== null ? `<div class="wd-uv ${uvWCls}">UV ${uvW} (${uvCat(uvW)})</div>` : ""}
            </div>`;
          }).join("")}
        </div>` : ""}
      </div>`;
    })() : ""}

    <!-- 3-DAY STRIP -->
    <div class="days-strip">
      ${DAY_NAMES.map((n,i)=>{
        const sc = dayScores[i];
        const cl = ["risk-none","risk-low","risk-mid","risk-high"][sc];
        const ri = RISK[sc];
        const wd = weather?.daily?.[i];
        const isToday = i === 0;
        return `<div class="day-card${i===activeDay?" active":""}"
                     style="${isToday&&i===activeDay?"background:var(--accent-subtle,var(--card2))":""}"
                     onclick="setDay(${i})">
          <div class="dc-label" style="${isToday?"font-weight:700":""}">${n}</div>
          <div class="dc-date">${dStr(i)}</div>
          <div class="dc-ring ${cl}" style="font-size:.85rem;font-weight:700">
            ${["✓","!","!!","‼"][sc]}
          </div>
          <div class="dc-sub" style="font-size:.7rem">${ri.label}</div>
          ${wd ? `<div style="font-size:.66rem;color:var(--text3);margin-top:3px">${wd.tempMax}° · ${wd.wind}km/h</div>` : ""}
        </div>`;
      }).join("")}
    </div>
    <div class="swipe-dots">
      ${[0,1,2].map(i=>`<div class="swipe-dot${i===activeDay?" active":""}"></div>`).join("")}
    </div>

    <!-- POLLEN TABLE -->
    <div class="card">
      <div class="card-head collapsible" onclick="toggleSection('pollen')">
        <span class="card-title">${t("all_pollen")} · ${DAY_NAMES[activeDay]}</span>
        <span class="collapse-arrow">▼</span>
      </div>
      <div class="collapsible-body" id="pollen-body">
      <div style="font-size:.71rem;color:var(--text3);padding:7px 14px 4px">${t("tap_hint")}</div>
      <table class="ptable">
        <thead>
          <tr>
            <th>Pollen</th>
            ${DAY_NAMES.map((n,i)=>`<th class="${i===activeDay?"col-hi":""}">${n}<br><span style="text-transform:none;font-size:.65rem;font-weight:400;letter-spacing:0">${dStr(i)}</span></th>`).join("")}
          </tr>
        </thead>

          ${POLLEN.map(p=>{
            const on = filter.includes(p.key);
            const inSeason = p.mo.includes(month);

            const lvls = vals.map(lv);
            return `<tr class="${!on?"dim":"active-row"}" onclick="toggleFilter('${p.key}')" style="cursor:pointer">
              <td>
                <span class="picon">${p.icon}</span><span class="pname">${t(p.key)}</span>
                <span class="ps ${inSeason?"on":"off"}">${inSeason?"🌱 "+t("s_"+p.key):"💤 "+t("s_"+p.key)}</span>
              </td>
              ${lvls.map((l,i)=>`
                <td class="${i===activeDay?"col-hi":""}">
                  <span class="badge ${l.cls}">${l.label}</span>
                </td>`).join("")}
            </tr>`;
          }).join("")}
        </tbody>
      </table>

        <button class="card-action" onclick="event.stopPropagation();resetFilter()" style="font-size:.78rem">${t("select_all")}</button>
      </div>
      </div>
    </div>

    <!-- HISTORY -->
    ${renderHistory()}

  `;

function renderHistory() {
  const filteredPollen = POLLEN.filter(p=>filter.includes(p.key));
  const days = Object.keys(history).sort().slice(-7);
  if (days.length < 2 || !filteredPollen.length) return "";

  const dateLabels = days.map(d => {
    const dt = new Date(d+"T12:00:00");
    return dt.toLocaleDateString(lang==="de"?"de-DE":"en-GB",{day:"2-digit",month:"2-digit"});
  });

  return `
    <div class="card">
      <div class="card-head"><span class="card-title">${t("history_title")} ${days.length} ${t("days")}</span></div>
      <div class="history-wrap">
        <div class="hist-dates">${dateLabels.map(d=>`<div class="hist-dt">${d}</div>`).join("")}</div>
        ${filteredPollen.map(p=>`
          <div class="hist-row">
            <div class="hist-name">${p.icon} ${t(p.key)}</div>
            <div class="hist-bars">
              ${days.map(d=>{
                const v = history[d]?.[p.key] ?? "-1";
                const sc = lv(v).sc;
                return `<div class="hist-bar" data-v="${sc}" title="${d}: ${lv(v).label}"></div>`;
              }).join("")}
            </div>
          </div>`).join("")}
      </div>
    </div>`;
}

function renderSymHistory() {
  const entries = Object.entries(symptoms).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);
  if (!entries.length) return "";
  const sc = v => !v?"#3f3f46":["#3f3f46","#22c55e","#eab308","#f97316","#ef4444","#b91c1c"][v]??"#b91c1c";
  return `
    <div class="sym-hist">
      <div class="sym-hist-title">${t("saved_entries")}</div>
      ${entries.map(([d,s])=>`
        <div class="sym-hist-row">
          <div class="sym-hist-date">${new Date(d+"T12:00:00").toLocaleDateString(lang==="de"?"de-DE":"en-GB",{day:"2-digit",month:"2-digit"})}</div>
          ${["niesen","augen","atmung","muedigkeit"].map(k=>`
            <div class="sym-dot" style="background:${sc(s[k])};color:#fff">${s[k]||"–"}</div>`).join("")}
          <span style="font-size:.7rem;color:var(--text3)">${t("n_label")} · ${t("a_label")} · ${t("at_label")} · ${t("m_label")}</span>
        </div>`).join("")}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────────────────────────────────────
function setDay(i) { activeDay=i; render(); }

function toggleFilter(key) {
  filter = filter.includes(key) ? filter.filter(k=>k!==key) : [...filter,key];
  localStorage.setItem(LS.filter, JSON.stringify(filter));
  render();
}
function resetFilter() {
  filter = POLLEN.map(p=>p.key);
  localStorage.setItem(LS.filter, JSON.stringify(filter));
  render();
}

function setSym(key, val) {
  draft[key] = val;
  const map = {niesen:t("niesen"), augen:t("augen"), atmung:t("atmung"), muedigkeit:t("muedigkeit")};
  document.querySelectorAll(".sym-row").forEach(row => {
    const lb = row.querySelector(".sym-label");
    if (lb?.textContent === map[key]) {
      row.querySelectorAll(".sym-btn").forEach((b,i) => b.classList.toggle("on",i===val));
    }
  });
  // Speichern-Button wieder einblenden wenn Wert geändert
  if (symSaved) {
    const saved = symptoms[todayISO()];
    const changed = !saved || Object.keys(draft).some(k => draft[k] !== (saved[k] || 0));
    if (changed) {
      symSaved = false;
      const body = document.getElementById("dsym-body");
      if (body && !body.querySelector(".sym-save")) {
        const btn = document.createElement("button");
        btn.className = "sym-save";
        btn.textContent = t("save");
        btn.onclick = saveSym;
        body.querySelector(".sym-hist")
          ? body.insertBefore(btn, body.querySelector(".sym-hist"))
          : body.appendChild(btn);
      }
    }
  }
}
function saveSym() {
  symptoms[todayISO()] = {...draft};
  localStorage.setItem(LS.syms, JSON.stringify(symptoms));
  symSaved = true;
  render();
}

function toggleSection(id) {
  const body = document.getElementById(id+"-body");
  const head = body?.previousElementSibling;
  if (!body) return;
  const open = body.classList.toggle("open");

  open ? openSections.add(id) : openSections.delete(id);
}

// ─────────────────────────────────────────────────────────────────────────────
// WEATHER
// ─────────────────────────────────────────────────────────────────────────────
async function loadWeather() {
  const coords = REGION_COORDS[rKey] || {lat:52.37,lon:9.73};
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}`
    + `&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m`
    + `&daily=temperature_2m_max,precipitation_sum,wind_speed_10m_max,uv_index_max`
    + `&timezone=Europe%2FBerlin&forecast_days=7`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    weather = {
      current: {
        temp:     Math.round(data.current.temperature_2m),
        humidity: data.current.relative_humidity_2m,
        rain:     data.current.precipitation,
        wind:     Math.round(data.current.wind_speed_10m),
      },
      daily: data.daily.time.map((_, i) => ({
        tempMax: Math.round(data.daily.temperature_2m_max[i]),
        rain:    Math.round((data.daily.precipitation_sum[i] ?? 0) * 10) / 10,
        wind:    Math.round(data.daily.wind_speed_10m_max[i]),
        uv:      data.daily.uv_index_max ? Math.round(data.daily.uv_index_max[i]) : null,
      })),
      fetchedAt: Date.now(),
    };
  } catch { weather = null; }
  render();
}

function calcPollenEffect(dayIdx) {
  if (!weather) return null;
  const d = weather.daily[dayIdx] ?? weather.daily[0];
  const rain = d.rain ?? 0;
  const wind = d.wind ?? 0;
  const humidity = weather.current.humidity ?? 50;

  if (rain > 2)               return { cls:"risk-none",  icon:"🌧", text:t("effect_rain_heavy") };
  if (wind > 25 && rain < 1)  return { cls:"risk-high",  icon:"💨", text:t("effect_wind_strong") };
  if (wind > 15 && rain < 1)  return { cls:"risk-mid",   icon:"💨", text:t("effect_wind") };
  if (humidity > 80)          return { cls:"risk-low",   icon:"💧", text:t("effect_humid") };
  if (rain > 0.5)             return { cls:"risk-low",   icon:"🌦", text:t("effect_rain_light") };
  return                             { cls:"risk-none",  icon:"☀️", text:t("effect_neutral") };
}

// ─────────────────────────────────────────────────────────────────────────────
// GEO LOCATE
// ─────────────────────────────────────────────────────────────────────────────
function geoLocate() {
  if (!navigator.geolocation) { alert(t("geo_unsupported")); return; }
  const btn = document.getElementById("geo-btn");
  btn.disabled = true; btn.textContent = "⏳";
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    let best = null, bestDist = Infinity;
    for (const [key, c] of Object.entries(REGION_COORDS)) {
      const d = Math.hypot(c.lat - lat, c.lon - lon);
      if (d < bestDist) { bestDist = d; best = key; }
    }
    if (best) {
      rKey = best;
      localStorage.setItem(LS.region, rKey);
      const sel = document.getElementById("region-sel");
      if (sel) sel.value = rKey;
      weather = null;
      render();
      loadWeather();
    }
    btn.disabled = false; btn.textContent = "📍";
  }, () => {
    alert(t("geo_error"));
    btn.disabled = false; btn.textContent = "📍";
  }, { timeout: 8000 });
}

// ─────────────────────────────────────────────────────────────────────────────
// SYMPTOM–POLLEN CORRELATION
// ─────────────────────────────────────────────────────────────────────────────
function renderCorrelation() {
  const symEntries = Object.entries(symptoms);
  if (symEntries.length < 3) return ""; // need at least 3 days
  const filteredPollen = POLLEN.filter(p => filter.includes(p.key));
  if (!filteredPollen.length) return "";

  // For each pollen, compute avg total symptom score on days with that pollen active vs not
  const results = [];
  for (const p of filteredPollen) {
    const activeScores = [], inactiveScores = [];
    for (const [date, sym] of symEntries) {
      const hist = history[date];
      if (!hist) continue;
      const polLevel = lv(hist[p.key] ?? "-1").sc;
      const symScore = (sym.niesen || 0) + (sym.augen || 0) + (sym.atmung || 0) + (sym.muedigkeit || 0);
      if (polLevel >= 1) activeScores.push(symScore);
      else inactiveScores.push(symScore);
    }
    if (!activeScores.length || !inactiveScores.length) continue;
    const avgActive   = activeScores.reduce((a,b)=>a+b,0)   / activeScores.length;
    const avgInactive = inactiveScores.reduce((a,b)=>a+b,0) / inactiveScores.length;
    const diff = avgActive - avgInactive;
    if (diff > 0.5) results.push({ p, diff, avgActive });
  }

  if (!results.length) return "";
  results.sort((a,b) => b.diff - a.diff);
  const maxDiff = results[0].diff;

  return `
    <div class="corr-wrap">
      <div class="corr-title">${t("corr_title")}</div>
      ${results.map(({p, diff}) => `
        <div class="corr-row">
          <div class="corr-name">${p.icon} ${t(p.key)}</div>
          <div class="corr-track"><div class="corr-fill" style="width:${Math.round((diff/maxDiff)*100)}%"></div></div>
          <div class="corr-lbl">+${diff.toFixed(1)}</div>
        </div>`).join("")}
      <div style="font-size:.68rem;color:var(--text3);margin-top:6px">${t("corr_hint")}</div>
    </div>`;
}

// LOAD
// ─────────────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch("./data.json?v="+Date.now());
    if (!res.ok) throw new Error();
    db = await res.json();
    localStorage.setItem(LS.cache, JSON.stringify(db));
    localStorage.setItem(LS.cache + "_ts", new Date().toISOString());
  } catch {
    const c = localStorage.getItem(LS.cache);
    if (c) {
      db = JSON.parse(c);
      document.getElementById("offline-pill").classList.add("show");
    } else {
      document.getElementById("page").innerHTML =
        `<div class="center">${t("no_data")}<br><small>${t("check_conn")}</small></div>`;
      return;
    }
  }

  // Region dropdown
  const sel = document.getElementById("region-sel");
  const groups = {};
  for (const r of db.regions) {
    if (!groups[r.region_name]) groups[r.region_name] = [];
    groups[r.region_name].push(r);
  }
  sel.innerHTML = "";
  for (const [name, list] of Object.entries(groups)) {
    const g = document.createElement("optgroup");
    g.label = name;
    for (const r of list) {
      const o = document.createElement("option");
      o.value = rk(r); o.textContent = r.partregion_name || r.region_name;
      if (rk(r)===rKey) o.selected = true;
      g.appendChild(o);
    }
    sel.appendChild(g);
  }

  // store today's history
  const reg = db.regions.find(r=>rk(r)===rKey) ?? db.regions[0];
  storeHistoryDay(reg.pollen);

  render();
  loadWeather(); // läuft parallel, rendert nochmal wenn fertig
}

// ── AUTO-REFRESH bei App-Wechsel ─────────────────────────────────────────────
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    const ts = localStorage.getItem(LS.cache + "_ts");
    const ageMin = ts ? (Date.now() - new Date(ts).getTime()) / 60000 : 999;
    if (ageMin > 30) load(); // neu laden wenn Daten älter als 30 Min
  }
});

// ── PULL-TO-REFRESH ──────────────────────────────────────────────────────────
let ptr_startY = 0, ptr_pulling = false;
const ptr_threshold = 70;

const ptr_el = document.createElement("div");
ptr_el.id = "ptr";
ptr_el.innerHTML = `<div id="ptr-icon">↓</div>`;
ptr_el.style.cssText = `
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; justify-content:center; align-items:center;
  height:0; overflow:hidden; transition:height .2s;
  background:var(--card); border-bottom:1px solid var(--border);
  font-size:.85rem; color:var(--text2);
`;
document.body.prepend(ptr_el);

document.addEventListener("touchstart", e => {
  if (window.scrollY === 0) ptr_startY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener("touchmove", e => {
  if (!ptr_startY) return;
  const dy = e.touches[0].clientY - ptr_startY;
  if (dy > 10 && window.scrollY === 0) {
    ptr_pulling = true;
    const h = Math.min(dy * 0.4, 52);
    ptr_el.style.height = h + "px";
    ptr_el.querySelector("#ptr-icon").textContent = h >= ptr_threshold * 0.4 ? "↺ Loslassen" : "↓ Ziehen";
  }
}, { passive: true });

document.addEventListener("touchend", () => {
  if (ptr_pulling && parseInt(ptr_el.style.height) >= ptr_threshold * 0.4) {
    ptr_el.style.height = "42px";
    ptr_el.querySelector("#ptr-icon").textContent = "⟳ Aktualisiere…";
    load().finally(() => {
      ptr_el.style.height = "0";
    });
  } else {
    ptr_el.style.height = "0";
  }
  ptr_startY = 0; ptr_pulling = false;
}, { passive: true });

// ── SWIPE ZWISCHEN TAGEN ──────────────────────────────────────────────────────
let swipe_startX = 0, swipe_startY = 0;
document.addEventListener("touchstart", e => {
  swipe_startX = e.touches[0].clientX;
  swipe_startY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - swipe_startX;
  const dy = e.changedTouches[0].clientY - swipe_startY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0 && activeDay < 2) setDay(activeDay + 1); // links → nächster Tag
    if (dx > 0 && activeDay > 0) setDay(activeDay - 1); // rechts → vorheriger Tag
  }
}, { passive: true });

// ── SWIPE TO CLOSE DRAWER ────────────────────────────────────────────────────
let dswipe_startX = 0;
document.getElementById("drawer").addEventListener("touchstart", e => {
  dswipe_startX = e.touches[0].clientX;
}, { passive: true });
document.getElementById("drawer").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - dswipe_startX;
  if (dx < -50) closeDrawer();
}, { passive: true });
</script>
